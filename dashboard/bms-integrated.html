<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BMS" />
  <meta name="theme-color" content="#000000" />
  <title>BMS</title>

  <!-- DSEG7 Classic — 7-segment LCD font, required by the design. -->
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/dseg7-classic" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <style>
    @font-face {
      font-family: "DSEG7 Classic";
      font-style: normal; font-weight: 700; font-display: block;
      src: url("https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Bold.woff2") format("woff2"),
           url("https://cdn.jsdelivr.net/gh/keshikan/DSEG@v0.46/fonts/DSEG7-Classic/DSEG7Classic-Bold.woff2") format("woff2");
    }
    /* Design tokens — verbatim from bms.css. */
    :root {
      --bms-bg: #000000;
      --bms-cyan: #38c8ff;
      --bms-cyan-glow: rgba(56, 200, 255, 0.55);
      --bms-cyan-dim: rgba(56, 200, 255, 0.18);
      --bms-cyan-off: rgba(56, 200, 255, 0.08);
      --bms-red: #ff2e3d;
      --bms-red-glow: rgba(255, 46, 61, 0.55);
      --bms-red-dim: rgba(255, 46, 61, 0.16);
      --bms-green: #1bff7c;
      --bms-green-glow: rgba(27, 255, 124, 0.55);
      --bms-green-dim: rgba(27, 255, 124, 0.16);
      --bms-amber: #ffb200;
      --bms-amber-glow: rgba(255, 178, 0, 0.55);
      --bms-amber-dim: rgba(255, 178, 0, 0.16);
      --bms-mute: #6b7280;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; background: var(--bms-bg); color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; overflow: hidden;
      user-select: none; -webkit-user-select: none;
    }
    .seg {
      font-family: "DSEG7 Classic", "DSEG7Classic", "DSEG7-Classic", monospace;
      font-weight: 700; letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }
    .cap {
      font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
      font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; font-size: 11px;
      color: var(--bms-mute);
    }

    /* Screen frame — flex column distributes extra vertical space evenly
       between rows instead of dumping it under the top bar. Gauge slot
       gets its size from aspect-ratio (100/62 matches viewBox). */
    /* Use dynamic viewport units (dvh/dvw) so the panel is always sized to
       what's actually visible — no overflow when the browser chrome shows.
       Sizing tokens further down are all in vh / vmin / dvh so nothing
       fixed in pixels can push the panel taller than the viewport. */
    .bms-screen {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 100dvh;
      padding:
        max(2dvh, env(safe-area-inset-top))
        max(2dvh, env(safe-area-inset-right))
        max(2dvh, env(safe-area-inset-bottom))
        max(2dvh, env(safe-area-inset-left));
      background: var(--bms-bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      gap: 1.6dvh;
      max-width: min(1100px, 92vw);
      margin: 0 auto;
      overflow: hidden;
    }
    .bms-screen::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
      mix-blend-mode: screen; opacity: 0.7;
    }

    /* Lost-connection overlay — small red box top-left. Shows when the
       BMS hasn't sent fresh data in the last 5 s. */
    .stale {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      padding: 10px 14px;
      background: rgba(255, 46, 61, 0.18);
      border: 1px solid var(--bms-red);
      border-radius: 8px;
      color: var(--bms-red);
      text-shadow: 0 0 10px var(--bms-red-glow);
      font-family: ui-monospace, "JetBrains Mono", monospace;
      font-weight: 700; letter-spacing: 0.1em;
      font-size: clamp(11px, 1.6dvh, 16px);
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 0 16px rgba(255, 46, 61, 0.35);
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 100;
    }
    .stale.visible { opacity: 1; pointer-events: auto; }
    .stale .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--bms-red);
      box-shadow: 0 0 8px var(--bms-red-glow);
      animation: bms-pulse 1.2s ease-in-out infinite;
    }

    /* TopBar — voltage left, temperature right, both at the same baseline. */
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 24px;
    }
    .top-cell { display: flex; align-items: center; gap: 10px; }
    .top-num {
      font-size: clamp(20px, 5.5dvh, 6vw); line-height: 1;
      color: var(--bms-cyan); text-shadow: 0 0 10px var(--bms-cyan-glow);
    }
    .top-num.warn  { color: var(--bms-red);   text-shadow: 0 0 10px var(--bms-red-glow); }
    .top-num.alert { color: var(--bms-amber); text-shadow: 0 0 10px var(--bms-amber-glow); }
    .top-unit {
      color: var(--bms-cyan);
      font-size: clamp(11px, 2.6dvh, 2.6vw); font-weight: 600; letter-spacing: 0.06em;
      line-height: 1;
      transform: translateY(1px);
    }
    .top-num.warn  + .top-unit { color: var(--bms-red); }
    .top-num.alert + .top-unit { color: var(--bms-amber); }
    .icon { width: clamp(18px, 4.4dvh, 4.4vw); height: clamp(18px, 4.4dvh, 4.4vw); flex: 0 0 auto; }

    /* Gauge slot — aspect-locked to the viewBox so it never letterboxes. */
    /* Gauge slot: aspect-ratio matches the trimmed viewBox so no letterbox
       bands appear inside. Fixed flex so we don't grow into the gap.
       max-height is the safety net that prevents content overflow on
       short windows. */
    .gauge-slot {
      position: relative;
      width: 100%;
      aspect-ratio: 100 / 49;
      align-self: center;
      flex: 0 0 auto;
      min-height: 0;
      max-height: 60dvh;
      max-width: 100%;
    }
    .gauge-svg {
      display: block;
      width: 100%; height: 100%;
    }
    /* SOC readout lives inside the SVG so it scales with the viewBox. */
    .soc-svg-text {
      font-family: "DSEG7 Classic", "DSEG7Classic", "DSEG7-Classic", monospace;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .soc-svg-pct {
      font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
      font-weight: 600;
    }
    .soc-amber  { fill: var(--bms-amber); filter: drop-shadow(0 0 4px var(--bms-amber-glow)); }
    .soc-red    { fill: var(--bms-red);   filter: drop-shadow(0 0 4px var(--bms-red-glow)); }
    .soc-green  { fill: var(--bms-green); filter: drop-shadow(0 0 4px var(--bms-green-glow)); }
    .soc-ghost  { fill: var(--bms-amber); opacity: 0.07; filter: none; }
    .soc-ghost.low  { fill: var(--bms-red); }
    .soc-ghost.high { fill: var(--bms-green); }

    /* Battery bar — 12 cells, zone-tinted, with frame glow. */
    .battery-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 0 24px;
    }
    .battery-frame {
      flex: 1; display: flex; gap: 4px;
      padding: 6px;
      border: 2px solid var(--bms-cyan);
      border-radius: 6px;
      box-shadow: 0 0 18px var(--bms-cyan-glow), inset 0 0 12px rgba(0,0,0,0.6);
      transition: border-color 220ms ease, box-shadow 220ms ease;
    }
    .battery-frame.low  { border-color: var(--bms-red);   box-shadow: 0 0 18px var(--bms-red-glow),   inset 0 0 12px rgba(0,0,0,0.6); }
    .battery-frame.high { border-color: var(--bms-green); box-shadow: 0 0 18px var(--bms-green-glow), inset 0 0 12px rgba(0,0,0,0.6); }
    .battery-cell {
      flex: 1; height: clamp(20px, 6dvh, 6vw); border-radius: 3px;
      background: rgba(255,255,255,0.04);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      transition: background 220ms ease, box-shadow 220ms ease;
    }
    .battery-cell.on-low  { background: var(--bms-red);   box-shadow: 0 0 8px var(--bms-red-glow),   inset 0 -2px 0 rgba(0,0,0,0.2); }
    .battery-cell.on-mid  { background: var(--bms-cyan);  box-shadow: 0 0 8px var(--bms-cyan-glow),  inset 0 -2px 0 rgba(0,0,0,0.2); }
    .battery-cell.on-high { background: var(--bms-green); box-shadow: 0 0 8px var(--bms-green-glow), inset 0 -2px 0 rgba(0,0,0,0.2); }
    .battery-nub {
      width: 0.9vmin; min-width: 6px; height: clamp(14px, 4dvh, 4vw); border-radius: 2px;
      background: var(--bms-cyan); box-shadow: 0 0 10px var(--bms-cyan-glow);
      transition: background 220ms ease, box-shadow 220ms ease;
    }
    .battery-nub.low  { background: var(--bms-red);   box-shadow: 0 0 10px var(--bms-red-glow); }
    .battery-nub.high { background: var(--bms-green); box-shadow: 0 0 10px var(--bms-green-glow); }

    /* PowerReadout — centered single optical line. Signed digits + W. */
    .power-row {
      display: flex; justify-content: center; align-items: center;
      padding: 0 24px;
    }
    .power {
      display: inline-flex; align-items: center; gap: 12px;
      line-height: 1;
    }
    .power.charging    { color: var(--bms-green); }
    .power.discharging { color: var(--bms-red); }
    .power.idle        { color: var(--bms-cyan); }
    /* Hide the flow icon in idle state — its horizontal stroke visually
       reads as a minus sign next to "0 W". */
    .power.idle .flow-icon { visibility: hidden; }
    .power-num {
      font-size: clamp(40px, 11dvh, 12vw); line-height: 1;
      text-shadow: 0 0 22px currentColor;
    }
    .power-unit {
      font-size: clamp(18px, 4.5dvh, 5vw); font-weight: 600; letter-spacing: 0.06em;
      transform: translateY(2px);
    }

    /* Toggle button → advanced view */
    .toggle-adv {
      position: fixed; bottom: 12px; right: 12px;
      width: 38px; height: 38px;
      border-radius: 19px;
      background: rgba(20,20,20,0.7);
      border: 1px solid #2a2a2a;
      color: #888; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 9; backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>

  <div class="stale" id="stale"><span class="dot"></span><span>BMS — NO LINK</span></div>

  <main class="bms-screen" id="screen">
    <!-- row 1: top gutter -->
    <div></div>

    <!-- row 2: TopBar -->
    <div class="topbar">
      <div class="top-cell">
        <svg class="icon" viewBox="0 0 16 16" id="bolt-icon"><path d="M9 1L3 9h4l-1 6 6-8H8l1-6z" fill="var(--bms-cyan)" style="filter: drop-shadow(0 0 6px var(--bms-cyan-glow))"/></svg>
        <span class="seg top-num" id="volt-num">--.-</span>
        <span class="top-unit" id="volt-unit">V</span>
      </div>
      <div class="top-cell">
        <span class="seg top-num" id="temp-num">--.-</span>
        <span class="top-unit" id="temp-unit">°C</span>
        <svg class="icon" viewBox="0 0 16 16" id="thermo-icon" style="filter: drop-shadow(0 0 6px var(--bms-cyan-glow))">
          <path d="M8 2.5a1.5 1.5 0 0 0-1.5 1.5v6.05a3 3 0 1 0 3 0V4A1.5 1.5 0 0 0 8 2.5zm0 1a.5.5 0 0 1 .5.5v6.5a.6.6 0 0 0 .27.5 2 2 0 1 1-1.54 0 .6.6 0 0 0 .27-.5V4a.5.5 0 0 1 .5-.5z" fill="var(--bms-cyan)"/>
          <circle cx="8" cy="12" r="1.5" fill="var(--bms-cyan)"/>
          <path d="M11 4h2M11 6h1.5M11 8h2" stroke="var(--bms-cyan)" stroke-width="1" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- row 3 gutter -->
    <div></div>

    <!-- Gauge — 'Refined' variant. SOC digits are inside the SVG so they
         scale exactly with the half-circle. -->
    <div class="gauge-slot">
      <svg class="gauge-svg" id="gauge-svg" viewBox="0 8 100 49" preserveAspectRatio="xMidYMid meet">
        <!-- faint inner ring -->
        <path id="gauge-inner" stroke="rgba(56,200,255,0.18)" stroke-width="0.4" fill="none" />
        <!-- ticks (built by JS) -->
        <g id="gauge-ticks"></g>
        <!-- SOC ghost (faint "888") -->
        <text id="soc-ghost" class="soc-svg-text soc-ghost"
              x="50" y="47" text-anchor="middle" font-size="24" dominant-baseline="alphabetic">88</text>
        <!-- SOC digits -->
        <text id="soc-digits" class="soc-svg-text soc-amber"
              x="50" y="47" text-anchor="middle" font-size="24" dominant-baseline="alphabetic">--</text>
        <!-- % glyph (positioned dynamically next to digits) -->
        <text id="soc-pct" class="soc-svg-pct soc-amber"
              x="68" y="42" text-anchor="start" font-size="8">%</text>
      </svg>
    </div>

    <!-- row 5 gutter -->
    <div></div>

    <!-- row 6: Battery bar (12 cells) -->
    <div class="battery-bar">
      <div class="battery-frame" id="battery-frame"></div>
      <div class="battery-nub" id="battery-nub"></div>
    </div>

    <!-- row 7 gutter -->
    <div></div>

    <!-- row 8: Power readout -->
    <div class="power-row">
      <div class="power discharging" id="power-row-inner">
        <svg class="icon flow-icon" viewBox="0 0 16 16" id="flow-icon" style="filter: drop-shadow(0 0 6px currentColor); width: 28px; height: 28px;">
          <path id="flow-path" d="M3 5l5 5 5-5M3 9l5 5 5-5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="seg power-num" id="power-num">---</span>
        <span class="power-unit">W</span>
      </div>
    </div>

    <!-- row 9 bottom gutter -->
    <div></div>
  </main>

  <a class="toggle-adv" href="bms-dashboard.html" title="advanced view">⚙</a>

  <script>
    // ============================================================
    // CONFIG
    // ============================================================
    const HA_URL = '';
    const TOKEN  = 'PASTE_LONG_LIVED_ACCESS_TOKEN_HERE';
    const E_SOC     = 'sensor.jk_pb_bms_state_of_charge';
    const E_VOLT    = 'sensor.jk_pb_bms_total_voltage';
    const E_POWER   = 'sensor.jk_pb_bms_power';
    const E_ONLINE  = 'binary_sensor.jk_pb_bms_online_status';
    const E_TEMPS = [
      'sensor.jk_pb_bms_power_tube_temperature',
      'sensor.jk_pb_bms_temperature_sensor_1',
      'sensor.jk_pb_bms_temperature_sensor_2',
      'sensor.jk_pb_bms_temperature_sensor_3',
      'sensor.jk_pb_bms_temperature_sensor_4',
      'sensor.jk_pb_bms_temperature_sensor_5',
    ];
    const POLL_MS  = 1000;          // 1Hz per design spec
    const STALE_MS = 15000;
    // ============================================================

    const isDemo = new URLSearchParams(location.search).has('demo');
    const $ = id => document.getElementById(id);

    // ---- Geometry helpers (mirror bms-gauges.jsx, but in viewBox 0..100 × 0..62) ----
    // Gauge canvas is 100 × 62 (the visible band of a 100×100 design canvas
    // after cropping the bottom 38%). cx = 50, cy = ~55% of original 100 = 55…
    // but inside our 62-tall viewBox, that maps to y = 55 (still within view).
    // Arc spans angle 180°→360° (left horizontal → right horizontal, top half).
    const G = { cx: 50, cy: 55, r: 44, ticks: 56 };
    const ARC_START = 180, ARC_END = 360;

    function angleAt(t) { return ARC_START + (ARC_END - ARC_START) * t; }
    function polar(cx, cy, r, deg) {
      const a = deg * Math.PI / 180;
      return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
    }
    function tickFillColor(t) {
      if (t < 0.30) return 'var(--bms-red)';
      if (t < 0.70) return 'var(--bms-cyan)';
      return 'var(--bms-green)';
    }
    function socZone(soc) {
      if (soc < 30) return 'low';
      if (soc < 70) return 'mid';
      return 'high';
    }

    // ---- Gauge — build the inner ring + 56 ticks once ----
    function buildGauge() {
      const innerRing = $('gauge-inner');
      const ringR = G.r * 0.78;
      const [sx, sy] = polar(G.cx, G.cy, ringR, ARC_START);
      const [ex, ey] = polar(G.cx, G.cy, ringR, ARC_END);
      innerRing.setAttribute('d', `M ${sx} ${sy} A ${ringR} ${ringR} 0 0 1 ${ex} ${ey}`);

      const tg = $('gauge-ticks');
      for (let i = 0; i < G.ticks; i++) {
        const major = i % 5 === 0;
        const t = i / (G.ticks - 1);
        const a = angleAt(t);
        const len = major ? 8.5 : 6.0;
        const [x1, y1] = polar(G.cx, G.cy, G.r, a);
        const [x2, y2] = polar(G.cx, G.cy, G.r - len, a);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1.toFixed(2));
        line.setAttribute('y1', y1.toFixed(2));
        line.setAttribute('x2', x2.toFixed(2));
        line.setAttribute('y2', y2.toFixed(2));
        line.setAttribute('stroke-linecap', 'round');
        line.setAttribute('stroke-width', major ? 0.6 : 0.4);
        line.dataset.major = major ? '1' : '0';
        line.dataset.idx = String(i);
        line.dataset.colorOn = tickFillColor(t);
        tg.appendChild(line);
      }
    }

    function updateGauge(soc) {
      const active = Math.round((soc / 100) * G.ticks);
      const ticks = $('gauge-ticks').children;
      for (let i = 0; i < ticks.length; i++) {
        const on = i < active;
        ticks[i].setAttribute('stroke', on ? ticks[i].dataset.colorOn : 'rgba(56,200,255,0.32)');
      }
    }

    // ---- Battery bar — 12 cells, zone-tinted ----
    const SEGMENTS = 12;
    function buildBatteryBar() {
      const frame = $('battery-frame');
      frame.innerHTML = '';
      for (let i = 0; i < SEGMENTS; i++) {
        const c = document.createElement('div');
        c.className = 'battery-cell';
        c.dataset.idx = String(i);
        // each cell's "zone" by position
        const cellT = i / SEGMENTS;
        c.dataset.zone = cellT < 0.30 ? 'low' : cellT < 0.70 ? 'mid' : 'high';
        frame.appendChild(c);
      }
    }
    function updateBatteryBar(soc) {
      const filled = Math.round((soc / 100) * SEGMENTS);
      const cells = $('battery-frame').children;
      for (let i = 0; i < cells.length; i++) {
        const on = i < filled;
        const z = cells[i].dataset.zone;
        cells[i].className = on ? `battery-cell on-${z}` : 'battery-cell';
      }
      const z = socZone(soc);
      $('battery-frame').className = `battery-frame ${z === 'mid' ? '' : z}`;
      $('battery-nub').className = `battery-nub ${z === 'mid' ? '' : z}`;
    }

    // ---- SOC readout (SVG text) — digits + ghost "88" backplate + dynamic
    //      % positioning. Zone colour: red < 30, amber mid, green ≥ 70.
    function updateSocReadout(soc) {
      const v = String(Math.max(0, Math.min(100, Math.round(soc))));
      const digits = $('soc-digits');
      const ghost = $('soc-ghost');
      const pct = $('soc-pct');
      digits.textContent = v;
      ghost.textContent = '8'.repeat(v.length);
      const z = socZone(soc);
      const colorClass = z === 'low' ? 'soc-red' : z === 'high' ? 'soc-green' : 'soc-amber';
      digits.setAttribute('class', `soc-svg-text ${colorClass}`);
      pct.setAttribute('class', `soc-svg-pct ${colorClass}`);
      ghost.setAttribute('class', `soc-svg-text soc-ghost ${z}`);
      // Position the % glyph next to the digits' right edge (dynamic, since
      // 1- and 2-digit values have very different widths).
      try {
        const bbox = digits.getBBox();
        pct.setAttribute('x', String(bbox.x + bbox.width + 1));
      } catch {}
    }

    // ---- TopBar updates with color thresholds ----
    function tempColorClass(t) {
      // <5 red, 5-10 amber, 10-30 cyan, >30 amber, >35 red
      if (isNaN(t)) return '';
      if (t < 5)  return 'warn';
      if (t < 10) return 'alert';
      if (t > 35) return 'warn';
      if (t > 30) return 'alert';
      return '';
    }
    function voltageColorClass(v) {
      // 16S LFP: <48 red, 48-50 amber, 50-56 cyan, 56-58 amber, >58 red
      if (isNaN(v)) return '';
      if (v < 48) return 'warn';
      if (v < 50) return 'alert';
      if (v > 58) return 'warn';
      if (v > 56) return 'alert';
      return '';
    }

    // ---- Power readout. Three states: idle (cyan, |W| ≤ 5), charging
    //      (green, > 5), discharging (red, < -5). Colour is the only
    //      direction signal — no plus/minus sign.
    const POWER_DEAD_W = 5;
    function updatePower(power) {
      const inner = $('power-row-inner');
      const num = $('power-num');
      const flowPath = $('flow-path');
      if (isNaN(power)) {
        inner.className = 'power idle';
        num.textContent = '---';
        return;
      }
      const w = Math.round(Math.abs(power));
      num.textContent = String(w);
      let state, flow;
      if (power >  POWER_DEAD_W) { state = 'charging';    flow = 'M3 11l5-5 5 5M3 7l5-5 5 5'; }
      else if (power < -POWER_DEAD_W) { state = 'discharging'; flow = 'M3 5l5 5 5-5M3 9l5 5 5-5'; }
      else                       { state = 'idle';        flow = 'M3 8h10';                  }
      inner.className = 'power ' + state;
      flowPath.setAttribute('d', flow);
    }

    // ---- HA fetch ----
    async function fetchState(id) {
      if (isDemo) return demoState(id);
      const r = await fetch(`${HA_URL}/api/states/${id}`, {
        headers: { 'Authorization': 'Bearer ' + TOKEN }, cache: 'no-store',
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }
    function demoState(id) {
      const t = Date.now() / 1000;
      const soc = 50 + 30 * Math.sin(t / 30);
      const v = 53 + Math.sin(t / 40);
      const cur = 8 * Math.sin(t / 8);
      const pwr = cur * v;
      const now = new Date().toISOString();
      const map = {
        [E_SOC]:    { state: soc.toFixed(1),  last_updated: now },
        [E_VOLT]:   { state: v.toFixed(2),    last_updated: now },
        [E_POWER]:  { state: pwr.toFixed(1),  last_updated: now },
        [E_ONLINE]: { state: 'on',            last_updated: now },
      };
      for (const e of E_TEMPS) map[e] = { state: '17.0', last_updated: now };
      return map[id];
    }

    async function tick() {
      try {
        const tempPromises = E_TEMPS.map(id => fetchState(id).catch(() => null));
        const [s, v, p, o, ...temps] = await Promise.all([
          fetchState(E_SOC),
          fetchState(E_VOLT),
          fetchState(E_POWER),
          fetchState(E_ONLINE),
          ...tempPromises,
        ]);
        const soc = parseFloat(s.state);
        const volt = parseFloat(v.state);
        const power = parseFloat(p.state);
        const online = o.state === 'on';
        const tVals = temps.filter(x => x && !isNaN(parseFloat(x.state))).map(x => parseFloat(x.state));
        const tMax = tVals.length ? Math.max(...tVals) : NaN;

        // Staleness: triggers the NO-LINK overlay if EITHER the BMS link
        // is reported down OR voltage hasn't been pushed in > 5 s. We use
        // voltage's last_updated because total_voltage jitters on every BMS
        // notification while idle power can dedupe to a flat 0 W and never
        // refresh its own last_updated.
        const STALE_GRACE_MS = 5000;
        const voltAgeMs = Date.now() - new Date(v.last_updated).getTime();
        const stale = !online || isNaN(soc) || voltAgeMs > STALE_GRACE_MS;
        $('stale').classList.toggle('visible', stale);

        if (!isNaN(soc)) {
          updateGauge(soc);
          updateBatteryBar(soc);
          updateSocReadout(soc);
        }

        // top-left: voltage
        const vNum = $('volt-num'); const vUnit = $('volt-unit');
        const vCls = voltageColorClass(volt);
        vNum.textContent = isNaN(volt) ? '--.-' : volt.toFixed(1);
        vNum.className = 'seg top-num' + (vCls ? ' ' + vCls : '');
        vUnit.className = 'top-unit'; // re-derived through CSS sibling chain

        // top-right: temperature
        const tNum = $('temp-num'); const tUnit = $('temp-unit');
        const tCls = tempColorClass(tMax);
        tNum.textContent = isNaN(tMax) ? '--.-' : tMax.toFixed(1);
        tNum.className = 'seg top-num' + (tCls ? ' ' + tCls : '');
        tUnit.className = 'top-unit';

        // Power readout — colour signals direction (cyan idle, green up,
        // red down). The bolt icon pulses when actively charging.
        updatePower(power);
        const charging = !isNaN(power) && power > POWER_DEAD_W;
        $('bolt-icon').style.animation = charging ? 'bms-pulse 1.6s ease-in-out infinite' : '';
      } catch (e) {
        console.error(e);
        $('stale').classList.add('visible');
      }
    }

    // pulse keyframes (added once)
    const styleSheet = document.styleSheets[0];
    try { styleSheet.insertRule('@keyframes bms-pulse{0%,100%{opacity:1}50%{opacity:.55}}', styleSheet.cssRules.length); } catch {}

    buildGauge();
    buildBatteryBar();
    tick();
    setInterval(tick, POLL_MS);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) tick(); });

    // Keyboard shortcut: A → switch to advanced view.
    document.addEventListener('keydown', (e) => {
      if (e.target.matches?.('input, textarea, select')) return;
      if (e.key === 'a' || e.key === 'A') location.href = 'bms-dashboard.html';
    });
  </script>
</body>
</html>
