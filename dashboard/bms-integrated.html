<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BMS" />
  <meta name="theme-color" content="#000000" />
  <title>BMS</title>

  <!-- DSEG7 Modern Bold — 7-segment LCD font, self-hosted. OFL 1.1.
       Source: https://github.com/keshikan/DSEG (see fonts/DSEG-LICENSE.txt). -->
  <style>
    @font-face {
      font-family: "DSEG7Modern";
      font-display: swap;
      src: url("/local/fonts/DSEG7Modern-Bold.woff2") format("woff2");
    }

    /* Design tokens — verbatim from bms.css. */
    :root {
      --seg-font: "DSEG7Modern", monospace;
      --bms-bg: #000000;
      --bms-cyan: #38c8ff;
      --bms-cyan-glow: transparent;
      --bms-cyan-dim: rgba(56, 200, 255, 0.18);
      --bms-cyan-off: rgba(56, 200, 255, 0.08);
      --bms-red: #ff2e3d;
      --bms-red-glow: transparent;
      --bms-red-dim: rgba(255, 46, 61, 0.16);
      --bms-green: #1bff7c;
      --bms-green-glow: transparent;
      --bms-green-dim: rgba(27, 255, 124, 0.16);
      --bms-amber: #ffb200;
      --bms-amber-glow: transparent;
      --bms-amber-dim: rgba(255, 178, 0, 0.16);
      --bms-mute: #6b7280;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; background: var(--bms-bg); color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; overflow: hidden;
      user-select: none; -webkit-user-select: none;
    }
    .seg {
      font-family: var(--seg-font);
      font-weight: 700; letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }
    .cap {
      font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
      font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; font-size: 11px;
      color: var(--bms-mute);
    }

    /* Screen frame — flex column distributes extra vertical space evenly
       between rows instead of dumping it under the top bar. Gauge slot
       gets its size from aspect-ratio (100/62 matches viewBox). */
    /* Use dynamic viewport units (dvh/dvw) so the panel is always sized to
       what's actually visible — no overflow when the browser chrome shows.
       Sizing tokens further down are all in vh / vmin / dvh so nothing
       fixed in pixels can push the panel taller than the viewport. */
    .bms-screen {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 100dvh;
      padding:
        max(2dvh, env(safe-area-inset-top))
        max(2dvh, env(safe-area-inset-right))
        max(2dvh, env(safe-area-inset-bottom))
        max(2dvh, env(safe-area-inset-left));
      background: var(--bms-bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      gap: 1.6dvh;
      max-width: min(1100px, 92vw);
      margin: 0 auto;
      overflow: hidden;
    }
    /* On landscape (≥ 5/4 aspect) drop the width cap and tighten top padding
       so the gauge can expand to the full viewport width AND height. */
    @media (min-aspect-ratio: 5/4) {
      .bms-screen {
        max-width: none;
        padding-top: max(0.6dvh, env(safe-area-inset-top));
      }
    }
    .bms-screen::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
      mix-blend-mode: screen; opacity: 0.7;
    }

    /* Lost-connection overlay — centred along the top edge so it doesn't
       collide with the absolute voltage/temperature topbar in the corners.
       Shows when the BMS hasn't sent fresh data in the last 5 s. */
    .stale {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 50%; transform: translateX(-50%);
      padding: 8px 12px;
      background: rgba(255, 46, 61, 0.18);
      border: 1px solid var(--bms-red);
      border-radius: 8px;
      color: var(--bms-red);
      text-shadow: 0 0 10px var(--bms-red-glow);
      font-family: ui-monospace, "JetBrains Mono", monospace;
      font-weight: 700; letter-spacing: 0.1em;
      font-size: clamp(11px, 1.6dvh, 16px);
      display: flex; align-items: center; gap: 8px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 100;
    }
    .stale.visible { opacity: 1; pointer-events: auto; }
    .stale .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--bms-red);
      box-shadow: 0 0 8px var(--bms-red-glow);
      animation: bms-pulse 1.2s ease-in-out infinite;
    }

    /* TopBar — voltage left, temperature right, both at the same baseline.
       In portrait it stays in the column flex flow (default). In landscape
       it lifts to an absolute overlay layer so the gauge can claim the full
       upper-viewport area; voltage/temperature anchor in the top corners,
       which never collide visually with the half-circle gauge in the centre. */
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 24px;
    }
    @media (min-aspect-ratio: 5/4) {
      .topbar {
        position: absolute;
        top: max(8px, env(safe-area-inset-top));
        left: 0; right: 0;
        padding: 0 max(12px, env(safe-area-inset-right)) 0 max(12px, env(safe-area-inset-left));
        pointer-events: none;
        z-index: 5;
      }
      /* Battery bar & twin row stay legible on wide laptops by re-applying
         a width cap of their own — the gauge between them spans full width. */
      .battery-bar, .bottom-row {
        max-width: min(1100px, 92vw);
        margin-left: auto; margin-right: auto;
        width: 100%;
      }
    }
    /* Topbar sizing — modest in portrait (cells share a narrow row in flex
       flow), generous in landscape (absolute overlay with empty corners). */
    .top-cell { display: flex; align-items: center; gap: 10px; }
    .top-num {
      font-size: clamp(20px, 5.5dvh, 6vw); line-height: 1;
      color: var(--bms-cyan); text-shadow: 0 0 10px var(--bms-cyan-glow);
    }
    .top-num.warn  { color: var(--bms-red);   text-shadow: 0 0 10px var(--bms-red-glow); }
    .top-num.alert { color: var(--bms-amber); text-shadow: 0 0 10px var(--bms-amber-glow); }
    .top-unit {
      color: var(--bms-cyan);
      font-size: clamp(11px, 2.6dvh, 2.6vw); font-weight: 600; letter-spacing: 0.06em;
      line-height: 1;
      transform: translateY(1px);
    }
    .top-num.warn  + .top-unit { color: var(--bms-red); }
    .top-num.alert + .top-unit { color: var(--bms-amber); }
    .icon { width: clamp(18px, 4.4dvh, 4.4vw); height: clamp(18px, 4.4dvh, 4.4vw); flex: 0 0 auto; }
    @media (min-aspect-ratio: 5/4) {
      .top-cell { gap: 14px; }
      .top-num  { font-size: clamp(28px, 8dvh, 8vw); }
      .top-unit { font-size: clamp(14px, 3.4dvh, 3.4vw); transform: translateY(2px); }
      .icon     { width: clamp(24px, 6dvh, 6vw); height: clamp(24px, 6dvh, 6vw); }
    }

    /* Gauge slot — by default takes width-driven natural size (good for
       narrow / portrait viewports where the gauge is constrained by width
       anyway). On landscape (≥ 5/4 aspect) we let it flex-grow to consume
       the available height: the absolute topbar floats over it, so the
       gauge can claim the entire upper-viewport area. Voltage/temperature
       sit in the corners; the speedometer arc stays in the centred rounded
       region, so visible content doesn't collide even if bounding boxes do. */
    .gauge-slot {
      position: relative;
      width: 100%;
      aspect-ratio: 100 / 49;
      align-self: center;
      flex: 0 0 auto;
      max-width: 100%;
    }
    .gauge-svg {
      display: block;
      width: 100%; height: 100%;
    }
    @media (min-aspect-ratio: 5/4) {
      .gauge-slot {
        flex: 1 1 0;
        min-height: 0;
        align-self: stretch;
        width: auto;
        aspect-ratio: auto;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .gauge-svg {
        height: 100%;
        width: auto;
        max-width: 100%;
        aspect-ratio: 100 / 49;
      }
    }
    /* SOC readout lives inside the SVG so it scales with the viewBox. */
    .soc-svg-text {
      font-family: var(--seg-font);
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .soc-amber  { fill: var(--bms-amber); filter: drop-shadow(0 0 4px var(--bms-amber-glow)); }
    .soc-red    { fill: var(--bms-red);   filter: drop-shadow(0 0 4px var(--bms-red-glow)); }
    .soc-cyan   { fill: var(--bms-cyan);  filter: drop-shadow(0 0 4px var(--bms-cyan-glow)); }
    .soc-green  { fill: var(--bms-green); filter: drop-shadow(0 0 4px var(--bms-green-glow)); }
    .soc-ghost  { fill: var(--bms-cyan); opacity: 0.07; filter: none; }
    .soc-ghost.low  { fill: var(--bms-red); }
    .soc-ghost.warn { fill: var(--bms-amber); }
    .soc-ghost.high { fill: var(--bms-green); }

    /* Battery bar — 12 cells, zone-tinted, with frame glow. */
    .battery-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 0 24px;
    }
    .battery-frame {
      flex: 1; display: flex; gap: 4px;
      padding: 6px;
      border: 2px solid var(--bms-cyan);
      border-radius: 6px;
      box-shadow: 0 0 18px var(--bms-cyan-glow), inset 0 0 12px rgba(0,0,0,0.6);
    }
    .battery-frame.low  { border-color: var(--bms-red);   box-shadow: 0 0 18px var(--bms-red-glow),   inset 0 0 12px rgba(0,0,0,0.6); }
    .battery-frame.warn { border-color: var(--bms-amber); box-shadow: 0 0 18px var(--bms-amber-glow), inset 0 0 12px rgba(0,0,0,0.6); }
    .battery-frame.high { border-color: var(--bms-green); box-shadow: 0 0 18px var(--bms-green-glow), inset 0 0 12px rgba(0,0,0,0.6); }
    .battery-cell {
      flex: 1; height: clamp(20px, 6dvh, 6vw); border-radius: 3px;
      background: rgba(255,255,255,0.04);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .battery-cell.on-low  { background: var(--bms-red);   box-shadow: 0 0 8px var(--bms-red-glow),   inset 0 -2px 0 rgba(0,0,0,0.2); }
    .battery-cell.on-warn { background: var(--bms-amber); box-shadow: 0 0 8px var(--bms-amber-glow), inset 0 -2px 0 rgba(0,0,0,0.2); }
    .battery-cell.on-mid  { background: var(--bms-cyan);  box-shadow: 0 0 8px var(--bms-cyan-glow),  inset 0 -2px 0 rgba(0,0,0,0.2); }
    .battery-cell.on-high { background: var(--bms-green); box-shadow: 0 0 8px var(--bms-green-glow), inset 0 -2px 0 rgba(0,0,0,0.2); }
    .battery-nub {
      width: 0.9vmin; min-width: 6px; height: clamp(14px, 4dvh, 4vw); border-radius: 2px;
      background: var(--bms-cyan); box-shadow: 0 0 10px var(--bms-cyan-glow);
    }
    .battery-nub.low  { background: var(--bms-red);   box-shadow: 0 0 10px var(--bms-red-glow); }
    .battery-nub.warn { background: var(--bms-amber); box-shadow: 0 0 10px var(--bms-amber-glow); }
    .battery-nub.high { background: var(--bms-green); box-shadow: 0 0 10px var(--bms-green-glow); }

    /* PowerReadout — centered single optical line. Signed digits + W. */
    /* Bottom row — symmetric twin layout.
       Power on the left, runtime prediction on the right, equal weight.
       Each cell: tiny uppercase label on top, big seg-digits in the middle,
       small unit/day suffix on the right. Direction colour (charging / dis-
       charging / idle) applies uniformly to both cells. */
    .bottom-row {
      display: flex;
      gap: clamp(16px, 4vw, 48px);
      padding: 0 16px;
      align-items: stretch;
      justify-content: center;
    }
    .bottom-cell {
      flex: 1 1 0; min-width: 0;
      display: flex; flex-direction: column; align-items: center;
      gap: clamp(2px, 0.6dvh, 6px);
    }
    .bottom-label {
      font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
      font-size: clamp(10px, 1.4dvh, 13px);
      letter-spacing: 0.12em; text-transform: uppercase;
      opacity: 0.5;
      white-space: nowrap;
    }
    .bottom-value {
      display: inline-flex; align-items: baseline; gap: 10px;
      font-family: var(--seg-font); line-height: 1;
    }
    .bottom-value .seg {
      font-size: clamp(36px, 9dvh, 7vw);
    }
    .bottom-unit {
      font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
      font-size: clamp(13px, 2.6dvh, 22px);
      font-weight: 600; letter-spacing: 0.06em;
      opacity: 0.65; text-transform: uppercase;
      transform: translateY(2px);
    }
    /* Direction colours applied uniformly across both cells. */
    .bottom-cell.charging    { color: var(--bms-green); }
    .bottom-cell.discharging { color: var(--bms-red); }
    .bottom-cell.idle        { color: var(--bms-cyan); }
    /* Phone-portrait: tighten the twin row so it fits without overflowing.
       Drop the day suffix (label still says "until empty / until full" so
       direction is clear) and shrink digit/font sizes a notch. */
    @media (max-aspect-ratio: 5/4) {
      .bottom-cell.prediction #pred-day { display: none; }
      .bottom-value .seg     { font-size: clamp(22px, 6dvh, 8vw); }
      .bottom-unit           { font-size: clamp(10px, 1.8dvh, 16px); }
      .bottom-label          { font-size: clamp(9px, 1.2dvh, 12px); }
    }
    /* Hide flow icon at idle — the horizontal stroke visually reads as "-". */
    .bottom-cell.power.idle .flow-icon { visibility: hidden; }
    /* Power-cell flow icon sits inline with the digits. */
    .bottom-cell.power .flow-icon { width: clamp(20px, 3.2dvh, 28px); height: clamp(20px, 3.2dvh, 28px); }

    /* Toggle → advanced view. Text-only, same uppercase-monospace label
       style as the POWER / UNTIL EMPTY captions, so it sits in the same
       visual register as the rest of the dashboard. */
    .toggle-adv {
      position: fixed;
      bottom: max(10px, env(safe-area-inset-bottom));
      right:  max(14px, env(safe-area-inset-right));
      font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
      font-size: clamp(10px, 1.4dvh, 13px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      padding: 4px 6px;
      z-index: 9;
    }
    .toggle-adv:hover,
    .toggle-adv:focus-visible {
      color: rgba(255, 255, 255, 0.75);
      outline: none;
    }


  </style>
</head>
<body>

  <div class="stale" id="stale"><span class="dot"></span><span>BMS — NO LINK</span></div>

  <main class="bms-screen" id="screen">
    <!-- row 1: TopBar -->
    <div class="topbar">
      <div class="top-cell">
        <svg class="icon" viewBox="0 0 16 16" id="bolt-icon"><path d="M9 1L3 9h4l-1 6 6-8H8l1-6z" fill="var(--bms-cyan)" style="filter: drop-shadow(0 0 6px var(--bms-cyan-glow))"/></svg>
        <span class="seg top-num" id="volt-num">--.-</span>
        <span class="top-unit" id="volt-unit">V</span>
      </div>
      <div class="top-cell">
        <span class="seg top-num" id="temp-num">--.-</span>
        <span class="top-unit" id="temp-unit">°C</span>
        <svg class="icon" viewBox="0 0 16 16" id="thermo-icon" style="filter: drop-shadow(0 0 6px var(--bms-cyan-glow))">
          <path d="M8 2.5a1.5 1.5 0 0 0-1.5 1.5v6.05a3 3 0 1 0 3 0V4A1.5 1.5 0 0 0 8 2.5zm0 1a.5.5 0 0 1 .5.5v6.5a.6.6 0 0 0 .27.5 2 2 0 1 1-1.54 0 .6.6 0 0 0 .27-.5V4a.5.5 0 0 1 .5-.5z" fill="var(--bms-cyan)"/>
          <circle cx="8" cy="12" r="1.5" fill="var(--bms-cyan)"/>
          <path d="M11 4h2M11 6h1.5M11 8h2" stroke="var(--bms-cyan)" stroke-width="1" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- Gauge — 'Refined' variant. SOC digits are inside the SVG so they
         scale exactly with the half-circle. -->
    <div class="gauge-slot">
      <svg class="gauge-svg" id="gauge-svg" viewBox="0 8 100 49" preserveAspectRatio="xMidYMid meet">
        <!-- faint inner ring -->
        <path id="gauge-inner" stroke="rgba(56,200,255,0.18)" stroke-width="0.4" fill="none" />
        <!-- ticks (built by JS) -->
        <g id="gauge-ticks"></g>
        <!-- SOC ghost (faint "888") — baseline at y=55 == gauge diameter line,
             so digits sit on the half-circle's "floor" like a speedometer. -->
        <text id="soc-ghost" class="soc-svg-text soc-ghost"
              x="50" y="55" text-anchor="middle" font-size="24" dominant-baseline="alphabetic">88</text>
        <!-- SOC digits -->
        <text id="soc-digits" class="soc-svg-text soc-amber"
              x="50" y="55" text-anchor="middle" font-size="24" dominant-baseline="alphabetic">--</text>
      </svg>
    </div>

    <!-- Battery bar (12 cells) -->
    <div class="battery-bar">
      <div class="battery-frame" id="battery-frame"></div>
      <div class="battery-nub" id="battery-nub"></div>
    </div>

    <!-- Twin readouts — power left, runtime prediction right.
         Symmetric structure so the eye reads them as a matched pair. -->
    <div class="bottom-row">
      <div class="bottom-cell power discharging" id="power-row-inner">
        <div class="bottom-label">power</div>
        <div class="bottom-value">
          <svg class="icon flow-icon" viewBox="0 0 16 16" id="flow-icon" style="filter: drop-shadow(0 0 6px currentColor);">
            <path id="flow-path" d="M3 5l5 5 5-5M3 9l5 5 5-5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="seg power-num" id="power-num">---</span>
          <span class="bottom-unit">W</span>
        </div>
      </div>
      <div class="bottom-cell prediction" id="prediction-cell">
        <div class="bottom-label" id="pred-label">—</div>
        <div class="bottom-value">
          <span class="seg" id="pred-time">--:--</span>
          <span class="bottom-unit" id="pred-day">—</span>
        </div>
      </div>
    </div>

  </main>

  <a class="toggle-adv" href="bms-dashboard.html" title="Switch to advanced dashboard" aria-label="Switch to advanced dashboard">advanced ›</a>

  <!-- Pure functions extracted for testability — inlined into the deployed
       HTML by scripts/minify-html.py at deploy time. -->
  <script src="lib/zones.js"></script>
  <script src="lib/predict.js"></script>

  <script>
    // ============================================================
    // CONFIG
    // ============================================================
    const HA_URL = '';
    const TOKEN  = 'PASTE_LONG_LIVED_ACCESS_TOKEN_HERE';
    const E_SOC     = 'sensor.jk_pb_bms_state_of_charge';
    const E_VOLT    = 'sensor.jk_pb_bms_total_voltage';
    const E_POWER   = 'sensor.jk_pb_bms_power';
    const E_ONLINE  = 'binary_sensor.jk_pb_bms_online_status';
    const E_CAP_REM = 'sensor.jk_pb_bms_capacity_remaining';
    const E_CAP_TOT = 'sensor.jk_pb_bms_total_battery_capacity';
    const E_TEMPS = [
      'sensor.jk_pb_bms_power_tube_temperature',
      'sensor.jk_pb_bms_temperature_sensor_1',
      'sensor.jk_pb_bms_temperature_sensor_2',
      'sensor.jk_pb_bms_temperature_sensor_3',
      'sensor.jk_pb_bms_temperature_sensor_4',
      'sensor.jk_pb_bms_temperature_sensor_5',
    ];
    const POLL_MS  = 1000;          // 1Hz per design spec
    const STALE_MS = 15000;
    // ============================================================

    const isDemo = new URLSearchParams(location.search).has('demo');
    const $ = id => document.getElementById(id);

    // ---- Geometry helpers (mirror bms-gauges.jsx, but in viewBox 0..100 × 0..62) ----
    // Gauge canvas is 100 × 62 (the visible band of a 100×100 design canvas
    // after cropping the bottom 38%). cx = 50, cy = ~55% of original 100 = 55…
    // but inside our 62-tall viewBox, that maps to y = 55 (still within view).
    // Arc spans angle 180°→360° (left horizontal → right horizontal, top half).
    const G = { cx: 50, cy: 55, r: 44, ticks: 56 };
    const ARC_START = 180, ARC_END = 360;

    function angleAt(t) { return ARC_START + (ARC_END - ARC_START) * t; }
    function polar(cx, cy, r, deg) {
      const a = deg * Math.PI / 180;
      return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
    }
    // SOC banding helpers (tickFillColor, socZone) live in lib/zones.js;
    // the runtime prediction helpers (predictLinear, fmtPredictionParts,
    // roundToGrain, POWER_DEAD_W) live in lib/predict.js. Both are loaded
    // via the <script src> tags below this inline script and inlined into
    // the deployed HTML by scripts/minify-html.py.

    // ---- Gauge — build the inner ring + 56 ticks once ----
    function buildGauge() {
      const innerRing = $('gauge-inner');
      const ringR = G.r * 0.78;
      const [sx, sy] = polar(G.cx, G.cy, ringR, ARC_START);
      const [ex, ey] = polar(G.cx, G.cy, ringR, ARC_END);
      innerRing.setAttribute('d', `M ${sx} ${sy} A ${ringR} ${ringR} 0 0 1 ${ex} ${ey}`);

      const tg = $('gauge-ticks');
      for (let i = 0; i < G.ticks; i++) {
        const major = i % 5 === 0;
        const t = i / (G.ticks - 1);
        const a = angleAt(t);
        const len = major ? 8.5 : 6.0;
        const [x1, y1] = polar(G.cx, G.cy, G.r, a);
        const [x2, y2] = polar(G.cx, G.cy, G.r - len, a);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1.toFixed(2));
        line.setAttribute('y1', y1.toFixed(2));
        line.setAttribute('x2', x2.toFixed(2));
        line.setAttribute('y2', y2.toFixed(2));
        line.setAttribute('stroke-linecap', 'round');
        line.setAttribute('stroke-width', major ? 0.6 : 0.4);
        line.dataset.major = major ? '1' : '0';
        line.dataset.idx = String(i);
        line.dataset.colorOn = tickFillColor(t);
        tg.appendChild(line);
      }
    }

    function updateGauge(soc) {
      const active = Math.round((soc / 100) * G.ticks);
      const ticks = $('gauge-ticks').children;
      for (let i = 0; i < ticks.length; i++) {
        const on = i < active;
        ticks[i].setAttribute('stroke', on ? ticks[i].dataset.colorOn : 'rgba(56,200,255,0.32)');
      }
    }

    // ---- Battery bar — 12 cells, zone-tinted ----
    const SEGMENTS = 12;
    function buildBatteryBar() {
      const frame = $('battery-frame');
      frame.innerHTML = '';
      for (let i = 0; i < SEGMENTS; i++) {
        const c = document.createElement('div');
        c.className = 'battery-cell';
        c.dataset.idx = String(i);
        // each cell's "zone" by position — same 4-tier banding as the gauge
        const cellT = i / SEGMENTS;
        c.dataset.zone = cellT < 0.20 ? 'low'
                       : cellT < 0.40 ? 'warn'
                       : cellT < 0.70 ? 'mid'
                       : 'high';
        frame.appendChild(c);
      }
    }
    function updateBatteryBar(soc) {
      const filled = Math.round((soc / 100) * SEGMENTS);
      const cells = $('battery-frame').children;
      for (let i = 0; i < cells.length; i++) {
        const on = i < filled;
        const z = cells[i].dataset.zone;
        cells[i].className = on ? `battery-cell on-${z}` : 'battery-cell';
      }
      const z = socZone(soc);
      $('battery-frame').className = `battery-frame ${z === 'mid' ? '' : z}`;
      $('battery-nub').className = `battery-nub ${z === 'mid' ? '' : z}`;
    }

    // ---- SOC readout (SVG text) — digits + ghost "88" backplate.
    //      Zone colour: red < 20, amber 20-40, cyan 40-70, green ≥ 70.
    let _lastSoc = NaN;
    function updateSocReadout(soc) {
      _lastSoc = soc;
      const v = String(Math.max(0, Math.min(100, Math.round(soc))));
      const digits = $('soc-digits');
      const ghost  = $('soc-ghost');
      digits.textContent = v;
      ghost.textContent  = '8'.repeat(v.length);
      // DSEG7's "1" glyph fills only the right ~⅓ of its character cell —
      // it has empty advance to the LEFT of the strokes. text-anchor=middle
      // centres the *advance* box (including that empty space), so any
      // value with a leading "1" (1, 10..19, 100) reads visually shifted
      // right of the gauge axis. The geometric correction is the same
      // regardless of total digit count: the visible-ink centroid is
      // 0.325 × cell_width to the right of the advance centre, so we
      // shift by -0.325 × cell_width to bring it on-axis.
      // (Browsers' getBBox() on <text> returns the advance box, not the
      // ink box, so we can't measure dynamically — the offset is hardcoded
      // from the DSEG7 glyph metrics.)
      const ADVANCE_W = 12.5;       // ≈ DSEG7 cell width at font-size=24 in viewBox units
      const ONE_INK_FRAC = 0.65;    // empty advance to the LEFT of the "1" stroke (≈ 65% of cell)
      if (v[0] === '1') {
        const shift = -ONE_INK_FRAC * ADVANCE_W / 2;
        digits.setAttribute('transform', `translate(${shift} 0)`);
      } else {
        digits.removeAttribute('transform');
      }
      const z = socZone(soc);
      const colorClass =
          z === 'low'  ? 'soc-red'
        : z === 'warn' ? 'soc-amber'
        : z === 'high' ? 'soc-green'
        :                'soc-cyan';
      digits.setAttribute('class', `soc-svg-text ${colorClass}`);
      ghost.setAttribute('class',  `soc-svg-text soc-ghost ${z}`);
    }

    // ---- TopBar updates with color thresholds ----
    function tempColorClass(t) {
      // <5 red, 5-10 amber, 10-30 cyan, >30 amber, >35 red
      if (isNaN(t)) return '';
      if (t < 5)  return 'warn';
      if (t < 10) return 'alert';
      if (t > 35) return 'warn';
      if (t > 30) return 'alert';
      return '';
    }
    function voltageColorClass(v) {
      // 16S LFP: <48 red, 48-50 amber, 50-56 cyan, 56-58 amber, >58 red
      if (isNaN(v)) return '';
      if (v < 48) return 'warn';
      if (v < 50) return 'alert';
      if (v > 58) return 'warn';
      if (v > 56) return 'alert';
      return '';
    }

    // ---- Power readout. Three states: idle (cyan, |W| ≤ POWER_DEAD_W),
    //      charging (green), discharging (red). Colour is the only
    //      direction signal — no plus/minus sign. POWER_DEAD_W is defined
    //      in lib/predict.js (= 5 W).
    function updatePower(power) {
      const inner = $('power-row-inner');
      const num = $('power-num');
      const flowPath = $('flow-path');
      if (isNaN(power)) {
        inner.className = 'bottom-cell power idle';
        num.textContent = '---';
        return;
      }
      const w = Math.round(Math.abs(power));
      num.textContent = String(w);
      let state, flow;
      if (power >  POWER_DEAD_W) { state = 'charging';    flow = 'M3 11l5-5 5 5M3 7l5-5 5 5'; }
      else if (power < -POWER_DEAD_W) { state = 'discharging'; flow = 'M3 5l5 5 5-5M3 9l5 5 5-5'; }
      else                       { state = 'idle';        flow = 'M3 8h10';                  }
      inner.className = 'bottom-cell power ' + state;
      flowPath.setAttribute('d', flow);
    }

    // ============================================================
    // BATTERY TIME PREDICTION — linear projection from the rolling 1-hour
    // mean power. Daytime usage is irrelevant to "when will I run out at
    // night" because PV is replenishing while the user freely consumes; at
    // night the user organically moderates loads and the 1h mean reflects
    // actual sustained draw. We deliberately do NOT use a multi-day hour-
    // of-day pattern: it would be biased by daytime "free energy" behaviour
    // that doesn't carry over once the sun is down.
    // ============================================================
    const PRED_AVG_WINDOW_MS = 60 * 60 * 1000;   // 1 hour rolling mean
    const _recentBuf = [];                        // ring of {t, p}

    function pushRecent(p) {
      const now = Date.now();
      _recentBuf.push({ t: now, p });
      while (_recentBuf.length && now - _recentBuf[0].t > PRED_AVG_WINDOW_MS) _recentBuf.shift();
    }
    function recentAvg(windowMs) {
      const cutoff = Date.now() - windowMs;
      const recent = _recentBuf.filter(s => s.t >= cutoff);
      if (!recent.length) return NaN;
      return recent.reduce((s, x) => s + x.p, 0) / recent.length;
    }

    // The 1h-mean rate jitters slightly each second, so the projected hh:mm
    // wobbles ±1 min and the readout becomes flashy. Tame it two ways:
    //  • Round the displayed minute to a 5-minute grain (roundToGrain in lib/predict.js).
    //  • Throttle DOM updates to one per ~15 s — but force-refresh on
    //    direction change (charging ↔ discharging) so the colour flip
    //    is immediate.
    const PRED_DOM_REFRESH_MS = 15 * 1000;
    const PRED_TIME_GRAIN_MIN = 5;
    let _lastPredOut = { ts: 0, dir: '', kind: '', big: '', sub: '', lbl: '' };

    function updatePrediction(soc, capRemAh, capTotAh, voltV, signedPowerW) {
      const cell  = $('prediction-cell');
      const label = $('pred-label');
      const time  = $('pred-time');
      const day   = $('pred-day');

      // Compute the desired output first; only commit to DOM if it actually
      // changed *and* enough time has passed (or direction flipped).
      let dir = '', kind = '', lbl = '—', big = '--:--', sub = '—';

      if (!Number.isFinite(soc) || !Number.isFinite(voltV)) {
        // leave defaults
      } else if (!Number.isFinite(signedPowerW) || Math.abs(signedPowerW) < POWER_DEAD_W) {
        dir = 'idle'; lbl = 'idle';
      } else {
        let capacityFullWh = NaN;
        if (Number.isFinite(capTotAh) && capTotAh > 0) {
          capacityFullWh = capTotAh * voltV;
        } else if (Number.isFinite(capRemAh) && soc > 1) {
          capacityFullWh = (capRemAh * voltV) / (soc / 100);
        }
        if (Number.isFinite(capacityFullWh)) {
          const buf1h = recentAvg(PRED_AVG_WINDOW_MS);
          const ratePowerW = Number.isFinite(buf1h) ? buf1h : signedPowerW;
          const result = predictLinear(soc, capacityFullWh, ratePowerW);
          if (!result) {
            dir = ratePowerW > 0 ? 'charging' : 'discharging';
            lbl = dir; sub = 'stable';
          } else {
            dir = result.kind === 'empty' ? 'discharging' : 'charging';
            kind = result.kind;
            lbl = result.kind === 'empty' ? 'until empty' : 'until full';
            const rounded = roundToGrain(result.when, PRED_TIME_GRAIN_MIN);
            const parts = fmtPredictionParts(rounded);
            big = parts.hhmm; sub = parts.day;
          }
        }
      }

      const now = Date.now();
      const directionChanged = dir !== _lastPredOut.dir || kind !== _lastPredOut.kind;
      const stale = now - _lastPredOut.ts >= PRED_DOM_REFRESH_MS;
      const sameAsLast = lbl === _lastPredOut.lbl && big === _lastPredOut.big && sub === _lastPredOut.sub;

      if (sameAsLast && !directionChanged) {
        _lastPredOut.ts = now;   // still considered "fresh"
        return;
      }
      if (!directionChanged && !stale) return;

      cell.classList.remove('charging', 'discharging', 'idle');
      if (dir) cell.classList.add(dir);
      label.textContent = lbl;
      time.textContent  = big;
      day.textContent   = sub;
      _lastPredOut = { ts: now, dir, kind, lbl, big, sub };
    }

    // ---- HA fetch ----
    async function fetchState(id) {
      if (isDemo) return demoState(id);
      const r = await fetch(`${HA_URL}/api/states/${id}`, {
        headers: { 'Authorization': 'Bearer ' + TOKEN }, cache: 'no-store',
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }
    function demoState(id) {
      const t = Date.now() / 1000;
      // ?soc=N pins SOC to a fixed value (testing visual centering at
      // edge cases like 1, 11, 100). Default oscillates 20..80.
      const socOverride = new URLSearchParams(location.search).get('soc');
      const soc = socOverride !== null ? parseFloat(socOverride) : (50 + 30 * Math.sin(t / 30));
      const v = 53 + Math.sin(t / 40);
      const cur = 8 * Math.sin(t / 8);
      const pwr = cur * v;
      const now = new Date().toISOString();
      const map = {
        [E_SOC]:    { state: soc.toFixed(1),  last_updated: now },
        [E_VOLT]:   { state: v.toFixed(2),    last_updated: now },
        [E_POWER]:  { state: pwr.toFixed(1),  last_updated: now },
        [E_ONLINE]: { state: 'on',            last_updated: now },
        [E_CAP_REM]:{ state: ((soc/100)*280).toFixed(2), last_updated: now },
        [E_CAP_TOT]:{ state: '280',           last_updated: now },
      };
      for (const e of E_TEMPS) map[e] = { state: '17.0', last_updated: now };
      return map[id];
    }

    async function tick() {
      try {
        const tempPromises = E_TEMPS.map(id => fetchState(id).catch(() => null));
        const [s, v, p, o, cr, ct, ...temps] = await Promise.all([
          fetchState(E_SOC),
          fetchState(E_VOLT),
          fetchState(E_POWER),
          fetchState(E_ONLINE),
          fetchState(E_CAP_REM).catch(() => null),
          fetchState(E_CAP_TOT).catch(() => null),
          ...tempPromises,
        ]);
        const soc = parseFloat(s.state);
        const volt = parseFloat(v.state);
        const power = parseFloat(p.state);
        const online = o.state === 'on';
        const capRemAh = cr ? parseFloat(cr.state) : NaN;
        const capTotAh = ct ? parseFloat(ct.state) : NaN;
        const tVals = temps.filter(x => x && !isNaN(parseFloat(x.state))).map(x => parseFloat(x.state));
        // Average across all reporting sensors. The pack is small enough that
        // any one probe drifts ±2 °C from the rest depending on placement;
        // mean is more representative than max for a steady-state readout.
        const tAvg = tVals.length ? tVals.reduce((s, v) => s + v, 0) / tVals.length : NaN;

        // Staleness: triggers the NO-LINK overlay if EITHER the BMS link
        // is reported down OR voltage hasn't been pushed in > 5 s. We use
        // voltage's last_updated because total_voltage jitters on every BMS
        // notification while idle power can dedupe to a flat 0 W and never
        // refresh its own last_updated.
        const STALE_GRACE_MS = 5000;
        const voltAgeMs = Date.now() - new Date(v.last_updated).getTime();
        const stale = !online || isNaN(soc) || voltAgeMs > STALE_GRACE_MS;
        $('stale').classList.toggle('visible', stale);

        if (!isNaN(soc)) {
          updateGauge(soc);
          updateBatteryBar(soc);
          updateSocReadout(soc);
        }

        // top-left: voltage
        const vNum = $('volt-num'); const vUnit = $('volt-unit');
        const vCls = voltageColorClass(volt);
        vNum.textContent = isNaN(volt) ? '--.-' : volt.toFixed(1);
        vNum.className = 'seg top-num' + (vCls ? ' ' + vCls : '');
        vUnit.className = 'top-unit'; // re-derived through CSS sibling chain

        // top-right: temperature (mean across all reporting sensors)
        const tNum = $('temp-num'); const tUnit = $('temp-unit');
        const tCls = tempColorClass(tAvg);
        tNum.textContent = isNaN(tAvg) ? '--.-' : tAvg.toFixed(1);
        tNum.className = 'seg top-num' + (tCls ? ' ' + tCls : '');
        tUnit.className = 'top-unit';

        // Power readout — colour signals direction (cyan idle, green up,
        // red down). The bolt icon pulses when actively charging.
        updatePower(power);
        const charging = !isNaN(power) && power > POWER_DEAD_W;
        $('bolt-icon').style.animation = charging ? 'bms-pulse 1.6s ease-in-out infinite' : '';

        // Time-to-empty / time-to-full prediction (rolling 1h mean).
        if (!isNaN(power)) pushRecent(power);
        updatePrediction(soc, capRemAh, capTotAh, volt, power);
      } catch (e) {
        console.error(e);
        $('stale').classList.add('visible');
      }
    }

    // pulse keyframes (added once)
    const styleSheet = document.styleSheets[0];
    try { styleSheet.insertRule('@keyframes bms-pulse{0%,100%{opacity:1}50%{opacity:.55}}', styleSheet.cssRules.length); } catch {}

    buildGauge();
    buildBatteryBar();
    tick();
    setInterval(tick, POLL_MS);

    // Re-measure %-glyph position once DSEG7 web font is loaded — first paint
    // happens against the monospace fallback (narrower), so getBBox returns a
    // shorter width and the % glyph lands too close to the digits. After fonts
    // load we reposition with the correct metrics.
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => {
        if (!isNaN(_lastSoc)) updateSocReadout(_lastSoc);
      });
    }
    document.addEventListener('visibilitychange', () => { if (!document.hidden) tick(); });

    // Keyboard shortcut: A → advanced view.
    document.addEventListener('keydown', (e) => {
      if (e.target.matches?.('input, textarea, select')) return;
      if (e.key === 'a' || e.key === 'A') location.href = 'bms-dashboard.html';
    });
  </script>
</body>
</html>
