name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same ref when a newer push lands —
# common pattern for `ref-scoped` concurrency so PR rebases don't
# stack up redundant runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # Matrix across Linux + macOS — every contributor dev-loops on macOS,
    # CI lands on Linux. Catching portability bugs in scripts/*.sh (e.g.
    # GNU vs BSD sed/grep) needs both.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # uv provides Python + lockfile-driven deps in one shot. It downloads
      # the Python version pinned in `.python-version` (3.14) and reads
      # `uv.lock` to install esphome / ruff / ty deterministically.
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # setup-node hashes package-lock.json and restores the npm cache, so
      # `npm ci` is ~instant on a hit.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Sync Python deps (esphome + ruff + ty)
        run: uv sync --all-groups --frozen

      # `npm ci` is the CI-friendly counterpart of `npm install`: it refuses
      # to mutate package-lock.json, fails on drift, and is faster from a
      # warm cache than `install`.
      - name: Install npm dev deps (prettier)
        run: npm ci --no-audit --no-fund

      - name: just fmt-check (prettier + ruff)
        run: bash scripts/fmt.sh --check

      # secrets.yaml is gitignored — synthesise a stub from secrets.yaml.example
      # so the two can't silently drift. `*_encryption_key` placeholders need
      # a valid base64-32 to pass esphome's `api:` validator; everything else
      # collapses to "ci-stub". The `AA:BB:CC:DD:EE:FF` MAC in the example
      # is already a valid sentinel, so we leave it untouched.
      - name: Provide stub secrets.yaml
        run: |
          sed -E \
            -e 's/"REPLACE_WITH_BASE64_32_BYTES"/"1234567890123456789012345678901234567890123="/g' \
            -e 's/"(REPLACE_WITH_[A-Z_]+|PASTE_[A-Z_]+|your-[a-z-]+|100\.x\.x\.x)"/"ci-stub"/g' \
            secrets.yaml.example > secrets.yaml
          ln -sf "$(pwd)/secrets.yaml" inverter/secrets.yaml
          echo "--- stub secrets.yaml ---"
          cat secrets.yaml

      - name: scripts/check.sh
        run: bash scripts/check.sh

      - name: scripts/test.sh
        run: bash scripts/test.sh

      # Exercise deploy-ha.sh's argument parser, sha256 helper, and gating
      # on Linux without actually touching a remote box. --check-only stops
      # before any scp/ssh.
      - name: scripts/deploy-ha.sh --check-only
        env:
          HA_HOST: ci-stub
          HA_TOKEN: ci-stub
        run: bash scripts/deploy-ha.sh --check-only
