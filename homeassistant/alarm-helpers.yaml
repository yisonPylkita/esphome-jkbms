# Battery-room alarm — pure Home Assistant package, 2-state model.
#
# State machine (intentionally minimal — two states only):
#
#   disarmed     idle. Dashboard may show "UZBRAJANIE za Xs" if the
#                auto-arm conditions are converging.
#   armed_away   armed. Any wired sensor opening fires the siren and
#                push notification, but the panel STATE stays
#                armed_away — there is no separate `triggered` state.
#                Disarming silences the siren immediately.
#
# Why we use a `template` alarm_control_panel for a 2-state model:
# the iOS / Android mobile apps render the alarm_control_panel domain
# natively — lock-screen disarm widget, alarm-domain push styling,
# Apple Home / Google Home integration. We want to keep that, but
# the built-in `manual` platform always exposes every arm mode in
# the widget. A template panel lets us define only the actions we
# care about (`arm_away` + `disarm`), so the widget collapses to
# those two buttons.
#
# Deployed by `scripts/deploy-ha.sh` as `/config/packages/jk_alarm.yaml`.
# Template entities reload via `template.reload`; automation / helper
# / `homeassistant:` changes reload via their respective services.
#
# Testability:
#   `input_boolean.alarm_test_mode` routes destructive side-effects
#   (siren on/off, push notification) to `input_text.alarm_test_log`
#   instead of firing the real services.
#   `scripts/test-alarm-ha.sh` drives every transition through the
#   `alarm_control_panel` REST API without paging anyone.

# ---- Helpers ----
input_boolean:
  alarm_auto_arm_enabled:
    name: Alarm auto-arm enabled
    icon: mdi:shield-sync
    initial: true
  # The actual armed/disarmed state. The template
  # `alarm_control_panel.battery_room` below reads this; arming and
  # disarming write to it via the panel's services.
  alarm_armed:
    name: Alarm armed
    icon: mdi:shield-lock
    initial: false
  # When on, the siren / push automations log to alarm_test_log
  # instead of calling real services. Used by the integration test
  # and any time you want to step through transitions safely.
  alarm_test_mode:
    name: Alarm test mode
    icon: mdi:flask
    initial: false

input_number:
  alarm_arming_quiet_minutes:
    name: Alarm arming quiet minutes
    min: 1
    max: 30
    step: 1
    unit_of_measurement: "min"
    icon: mdi:timer-sand
    initial: 5
  alarm_siren_duration_s:
    name: Alarm siren duration
    min: 10
    max: 600
    step: 5
    unit_of_measurement: "s"
    icon: mdi:bullhorn
    initial: 60
  # Test-mode override for the quiet-hold window. Production
  # alarm_arming_quiet_minutes is minutes-long; tests use seconds.
  alarm_test_quiet_seconds:
    name: Alarm test quiet seconds
    min: 1
    max: 30
    step: 1
    unit_of_measurement: "s"
    icon: mdi:flask-empty
    initial: 3

input_text:
  # Captured by the `intrusion response` automation at the moment the
  # alarm fires — readable in the push notification, surfaced on the
  # dashboard as the "ALARM" banner. Cleared on disarm. The dashboard
  # uses non-empty-reason as the trigger for the alarming UI state,
  # so this doubles as the "alarm is currently active" flag.
  alarm_trigger_reason:
    name: Alarm trigger reason
    icon: mdi:information
    initial: ""
    max: 64
  # Test-mode side-effect log. Tests inspect this to verify the
  # right service WOULD have fired in production.
  alarm_test_log:
    name: Alarm test log
    icon: mdi:notebook-edit
    initial: ""
    max: 255

# ---- The alarm panel + derived state ----
#
# We use a `template` alarm_control_panel instead of the `manual`
# platform because `manual` always exposes every arm mode (Home /
# Away / Night / Vacation / Custom) in the mobile-app native widget,
# and we want strictly two: armed-away and disarmed. Template panels
# expose only the arm modes whose actions you define — so by listing
# only `arm_away:` and `disarm:` below, the widget collapses to those
# two buttons.
#
# Caveat: the button label for `arm_away` is hardcoded in HA's
# frontend as "Away" (or its localised equivalent). It cannot be
# renamed to "Armed" without dropping the alarm_control_panel domain
# entirely. We accept that trade-off to keep the native iOS / Android
# lock-screen alarm widget.
#
# The real source of truth is `input_boolean.alarm_armed`. The panel
# is a thin presentation layer over it. All automations and the
# dashboard still talk to `alarm_control_panel.battery_room` — they
# never have to know about the underlying input_boolean.
template:
  - alarm_control_panel:
      - name: Battery Room
        unique_id: battery_room_alarm
        # No PIN code needed to arm or disarm. Without these flags
        # the template panel defaults to `code_arm_required: true`
        # and ServiceValidationError-s every arm_away call without
        # a code. `code_format: no_code` also drops the PIN-entry
        # dialog from the mobile widget — purely a UX cleanup.
        code_arm_required: false
        code_format: no_code
        state: >-
          {% if is_state('input_boolean.alarm_armed', 'on') %}
            armed_away
          {% else %}
            disarmed
          {% endif %}
        arm_away:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.alarm_armed
        disarm:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.alarm_armed

  # `alarm_sensors_ok` is true iff every required sensor is reporting a
  # useful state (not unavailable, not unknown). The auto-arm automation
  # gates on this; the dashboard surfaces it as a warning banner when
  # false.
  - binary_sensor:
      - name: Alarm sensors ok
        unique_id: alarm_sensors_ok
        state: >-
          {{ states('binary_sensor.battery_room_door_contact')
             not in ['unavailable', 'unknown']
             and states('binary_sensor.battery_room_motion_main_occupancy')
             not in ['unavailable', 'unknown']
             and states('binary_sensor.battery_room_motion_aux_occupancy')
             not in ['unavailable', 'unknown'] }}
        icon: >-
          {% if is_state('binary_sensor.alarm_sensors_ok', 'on') %}
            mdi:shield-check
          {% else %}
            mdi:shield-alert
          {% endif %}
  # `alarm_sensors_missing` — human-readable list of which sensors are
  # unavailable, for the dashboard banner. Empty when all are healthy.
  - sensor:
      - name: Alarm sensors missing
        unique_id: alarm_sensors_missing
        state: >-
          {% set missing = namespace(s=[]) %}
          {% set pairs = [
            ('binary_sensor.battery_room_door_contact', 'czujnik drzwi'),
            ('binary_sensor.battery_room_motion_main_occupancy', 'czujnik ruchu (główny)'),
            ('binary_sensor.battery_room_motion_aux_occupancy', 'czujnik ruchu (pomocniczy)')
          ] %}
          {% for eid, label in pairs %}
            {% if states(eid) in ['unavailable', 'unknown'] %}
              {% set missing.s = missing.s + [label] %}
            {% endif %}
          {% endfor %}
          {{ missing.s | join(', ') }}

# ---- Notification group ----
# Single point of edit when adding / removing a family member's phone.
notify:
  - platform: group
    name: alarm_recipients
    services:
      - service: mobile_app_wojciechs_iphone
      - service: mobile_app_iphone_grzegorz

# ---- Automations ----
automation:
  # ---- Auto-arm: call arm_away once the room has been quiet for the
  #      configured duration (or the test-mode override). The template
  #      trigger's `for:` enforces continuous quiet — any sensor going
  #      `on` breaks the expression and the timer restarts. ----
  - alias: "jk_alarm: auto-arm"
    id: jk_alarm_auto_arm
    mode: single
    trigger:
      - platform: template
        value_template: >-
          {{ is_state('alarm_control_panel.battery_room', 'disarmed')
             and is_state('input_boolean.alarm_auto_arm_enabled', 'on')
             and is_state('binary_sensor.alarm_sensors_ok', 'on')
             and is_state('binary_sensor.battery_room_door_contact', 'off')
             and is_state('binary_sensor.battery_room_motion_main_occupancy', 'off')
             and is_state('binary_sensor.battery_room_motion_aux_occupancy', 'off') }}
        for:
          seconds: >-
            {% if is_state('input_boolean.alarm_test_mode', 'on') %}
              {{ states('input_number.alarm_test_quiet_seconds') | int(3) }}
            {% else %}
              {{ (states('input_number.alarm_arming_quiet_minutes') | int(5)) * 60 }}
            {% endif %}
    action:
      - service: alarm_control_panel.alarm_arm_away
        target:
          entity_id: alarm_control_panel.battery_room

  # ---- Intrusion response: a sensor opens while the panel is
  #      armed_away → record the reason, set the siren volume, fire
  #      the siren, send the actionable push. The panel STATE stays
  #      `armed_away` throughout; there is no separate triggered
  #      state. The siren self-quiets after its `duration` parameter;
  #      the alarm-active UI is signalled by the non-empty
  #      `alarm_trigger_reason`.
  #
  #      `mode: single` so a flurry of sensor opens during one
  #      intrusion event doesn't queue up duplicate sirens — only the
  #      first sensor-open in any given fire cycle gets through. After
  #      the action sequence finishes, subsequent sensor opens will
  #      fire it again. ----
  - alias: "jk_alarm: intrusion response"
    id: jk_alarm_intrusion_response
    mode: single
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.battery_room_door_contact
          - binary_sensor.battery_room_motion_main_occupancy
          - binary_sensor.battery_room_motion_aux_occupancy
        to: "on"
    condition:
      - condition: state
        entity_id: alarm_control_panel.battery_room
        state: armed_away
    action:
      # Capture every sensor that's currently `on` as the trigger
      # reason. Read by the push notification + the dashboard's
      # "ALARM ACTIVE" banner.
      - service: input_text.set_value
        target:
          entity_id: input_text.alarm_trigger_reason
        data:
          value: >-
            {% set reasons = [] %}
            {% if is_state('binary_sensor.battery_room_door_contact', 'on') %}
              {% set reasons = reasons + ['door'] %}
            {% endif %}
            {% if is_state('binary_sensor.battery_room_motion_main_occupancy', 'on') %}
              {% set reasons = reasons + ['motion_main'] %}
            {% endif %}
            {% if is_state('binary_sensor.battery_room_motion_aux_occupancy', 'on') %}
              {% set reasons = reasons + ['motion_aux'] %}
            {% endif %}
            {{ reasons | join(' · ') }}

      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.alarm_test_mode
                state: "on"
            sequence:
              # Test mode: log both side-effects, don't touch the real siren or
              # send push.
              - service: input_text.set_value
                target:
                  entity_id: input_text.alarm_test_log
                data:
                  value: >-
                    siren_on:{{ states('input_number.alarm_siren_duration_s') | int(60) }};push:{{ states('input_text.alarm_trigger_reason') }}
        default:
          # Production siren: Tuya TS0224 (`_TZ3000_cipibmnp`) over
          # Zigbee/Z2M. The HA `siren` entity has `assumed_state: true`
          # — there is no state readback. Two notes from the live debug
          # session, both load-bearing:
          #
          #   - `tone` is required. Without it, HA's siren.turn_on call
          #     flips the assumed state to `on` but the Z2M converter
          #     produces an `ssIasWd.startWarning` with mode=0 (silent),
          #     which the device honours by not making noise.
          #   - We must force `select.battery_room_siren_volume` to
          #     `high` before each turn_on. The device defaults to
          #     low/mute when re-paired or repowered.
          #
          # Zigbee downlink reliability to this device is marginal
          # (linkquality ~108 — borderline). Individual `startWarning`
          # commands are dropped by the radio retry layer at a high
          # rate. Compensate by firing the command 3 times across ~3 s;
          # the device ignores subsequent commands while a warning is
          # already playing, so the worst case is one extra noisy
          # second.
          - service: select.select_option
            target:
              entity_id: select.battery_room_siren_volume
            data:
              option: "high"
          - repeat:
              count: 3
              sequence:
                - service: siren.turn_on
                  target:
                    entity_id: siren.battery_room_siren
                  data:
                    tone: "burglar"
                    duration: "{{ states('input_number.alarm_siren_duration_s') | int(60) }}"
                - delay:
                    seconds: 1
          - service: notify.alarm_recipients
            data:
              title: "🚨 Alarm pomieszczenia akumulatorów"
              message: >-
                {% set ns = namespace(s=states('input_text.alarm_trigger_reason')) %}
                {% set tr = {
                  'door': 'otwarcie drzwi',
                  'motion_main': 'ruch (główny)',
                  'motion_aux': 'ruch (pomocniczy)'
                } %}
                {% for k, v in tr.items() %}
                  {% set ns.s = ns.s.replace(k, v) %}
                {% endfor %}
                Wyzwolony przez: {{ ns.s }}
              data:
                # iOS critical-alert payload — bypasses Do Not Disturb
                # and the silent switch.
                push:
                  sound:
                    critical: 1
                    name: default
                    volume: 1.0
                  interruption-level: critical
                channel: alarm
                importance: high
                ttl: 0
                priority: high
                # Lock-screen action buttons. `authentication_required`
                # forces Face ID / passcode on the destructive disarm.
                actions:
                  - action: "DISARM_BATTERY_ROOM"
                    title: "Rozbroj"
                    destructive: true
                    authentication_required: true
                  - action: "SILENCE_BATTERY_ROOM"
                    title: "Wycisz syrenę"
                    authentication_required: true
                  - action: "URI"
                    title: "Otwórz panel"
                    uri: "/local/alarm.html"

  # ---- Cleanup on disarm: silence the siren, clear the reason.
  #      Fires on EVERY transition into disarmed (auto-disarm, manual,
  #      mobile-app action — all route here).
  - alias: "jk_alarm: cleanup on disarm"
    id: jk_alarm_cleanup_on_disarm
    mode: single
    trigger:
      - platform: state
        entity_id: alarm_control_panel.battery_room
        to: disarmed
    action:
      - service: input_text.set_value
        target:
          entity_id: input_text.alarm_trigger_reason
        data:
          value: ""
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.alarm_test_mode
                state: "on"
            sequence:
              - service: input_text.set_value
                target:
                  entity_id: input_text.alarm_test_log
                data:
                  value: "siren_off"
        default:
          # Same retry hedge as the intrusion turn_on — Zigbee
          # downlink is unreliable. If the user hits DISARM and the
          # off command drops, the siren would keep wailing for the
          # remaining `duration` seconds. 3 attempts × 1 s gap.
          - repeat:
              count: 3
              sequence:
                - service: siren.turn_off
                  target:
                    entity_id: siren.battery_room_siren
                - delay:
                    seconds: 1

  # ---- Mobile-app notification action callbacks. ----
  - alias: "jk_alarm: handle notification action"
    id: jk_alarm_handle_notification_action
    mode: parallel
    max: 5
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: DISARM_BATTERY_ROOM
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: SILENCE_BATTERY_ROOM
    action:
      - choose:
          - conditions:
              - "{{ trigger.event.data.action == 'DISARM_BATTERY_ROOM' }}"
            sequence:
              - service: alarm_control_panel.alarm_disarm
                target:
                  entity_id: alarm_control_panel.battery_room
          - conditions:
              - "{{ trigger.event.data.action == 'SILENCE_BATTERY_ROOM' }}"
            sequence:
              - repeat:
                  count: 3
                  sequence:
                    - service: siren.turn_off
                      target:
                        entity_id: siren.battery_room_siren
                    - delay:
                        seconds: 1

  # ---- Low-battery alert — independent of the alarm state machine. ----
  - alias: alarm_sensor_battery_low
    description: Notify family when an alarm sensor's battery is low.
    mode: single
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.battery_room_door_battery_low
          - binary_sensor.battery_room_motion_aux_battery_low
        to: "on"
        for: "00:05:00"
    action:
      - service: notify.alarm_recipients
        data:
          title: "🔋 Czujnik alarmu — niski poziom baterii"
          message: >-
            {{ trigger.to_state.attributes.friendly_name or trigger.entity_id }}
            zgłasza niski poziom baterii. Wymień ogniwo, zanim alarm zostanie
            zdegradowany.
          data:
            channel: alarm
            importance: high
            push:
              interruption-level: time-sensitive
