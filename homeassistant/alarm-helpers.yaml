# Battery-room alarm — pure Home Assistant package, idiomatic build.
#
# Built around the `alarm_control_panel.manual` platform — the canonical
# HA alarm entity, so the iOS / Android mobile apps render it natively
# (lock-screen alarm widget, alarm-domain notifications, native arm /
# disarm tiles).
#
# Deployed by `scripts/deploy-ha.sh` as `/config/packages/jk_alarm.yaml`.
# HA merges each file in `/config/packages/` per-domain via the
# `homeassistant.packages: !include_dir_named packages` directive.
#
# Note: editing the `alarm_control_panel:` block below requires
# `ha core restart` to pick up — that part of HA's config is not in the
# YAML-reload path. Edits to automations / helpers / templates DO
# reload via `automation.reload` / `homeassistant.reload_core_config`.
#
# State model — what each panel state means here:
#
#   disarmed     idle, dashboard may show "UZBRAJANIE za Xs" if the
#                auto-arm conditions are converging.
#   armed_away   armed; sensors are watched.
#   pending      a sensor went on while armed_away — entry-delay
#                countdown before the panel transitions to triggered.
#                Dashboard surfaces this as "ALARM za Xs" to give the
#                user a chance to disarm.
#   triggered    siren fires (auto-quiets after siren_duration_s but
#                state latches — `trigger_time: 0` disables auto-
#                disarm); push goes out; stays here until manual
#                disarm.
#
# Auto-arm policy lives in an automation, not in the panel: the panel
# arms instantly when called; the automation only calls it once the
# quiet-hold window elapses (see `jk_alarm: auto-arm` below).
#
# Testability:
#   `input_boolean.alarm_test_mode` routes destructive side-effects
#   (siren on/off, push notification) to `input_text.alarm_test_log`.
#   `scripts/test-alarm-ha.sh` drives every transition through the
#   alarm_control_panel REST API without paging anyone.

# ---- Helpers ----
input_boolean:
  alarm_auto_arm_enabled:
    name: Alarm auto-arm enabled
    icon: mdi:shield-sync
    initial: true
  # When on, the siren / push automations log to alarm_test_log
  # instead of calling real services. Used by the integration test
  # and any time you want to step through transitions safely.
  alarm_test_mode:
    name: Alarm test mode
    icon: mdi:flask
    initial: false

input_number:
  alarm_arming_quiet_minutes:
    name: Alarm arming quiet minutes
    min: 1
    max: 30
    step: 1
    unit_of_measurement: "min"
    icon: mdi:timer-sand
    initial: 5
  alarm_siren_duration_s:
    name: Alarm siren duration
    min: 10
    max: 600
    step: 5
    unit_of_measurement: "s"
    icon: mdi:bullhorn
    initial: 60
  # Test-mode override for the quiet-hold window. Production
  # alarm_arming_quiet_minutes is minutes-long; tests use seconds.
  alarm_test_quiet_seconds:
    name: Alarm test quiet seconds
    min: 1
    max: 30
    step: 1
    unit_of_measurement: "s"
    icon: mdi:flask-empty
    initial: 3

input_text:
  # Captured by `jk_alarm: capture trigger reason` when the panel
  # transitions to pending — readable in the push notification and
  # surfaced on the alarm dashboard. Cleared on disarm.
  alarm_trigger_reason:
    name: Alarm trigger reason
    icon: mdi:information
    initial: ""
    max: 64
  # Test-mode side-effect log. Tests inspect this to verify the
  # right service WOULD have fired in production.
  alarm_test_log:
    name: Alarm test log
    icon: mdi:notebook-edit
    initial: ""
    max: 255

# ---- The alarm panel itself ----
# `code_*_required: false` means no PIN — arming / disarming via service
# call or the mobile-app widget succeeds without authentication. The
# mobile app notification actions still require biometric / passcode
# unlock via their own `authentication_required: true` flag.
alarm_control_panel:
  - platform: manual
    name: Battery Room
    code_arm_required: false
    arming_time: 0
    delay_time: 10
    # Effectively-infinite trigger window. The HA docs claim
    # `trigger_time: 0` disables auto-disarm, but in practice
    # `trigger_time: 0` ends up disabling the triggered state
    # entirely. Pick a value larger than any plausible siren run so
    # the panel stays in `triggered` until manual disarm — the
    # behaviour we want.
    trigger_time: 86400
    armed_away:
      arming_time: 0
      delay_time: 10
      trigger_time: 86400

# ---- Derived state ----
# Declarative replacement for the old "sensor status writeback"
# automation: `alarm_sensors_ok` is true iff every required sensor is
# reporting a useful state (not unavailable, not unknown). The
# auto-arm automation gates on this; the dashboard surfaces it as a
# warning banner when false.
template:
  - binary_sensor:
      - name: Alarm sensors ok
        unique_id: alarm_sensors_ok
        state: >-
          {{ states('binary_sensor.battery_room_door_contact')
             not in ['unavailable', 'unknown']
             and states('binary_sensor.battery_room_motion_main_occupancy')
             not in ['unavailable', 'unknown']
             and states('binary_sensor.battery_room_motion_aux_occupancy')
             not in ['unavailable', 'unknown'] }}
        icon: >-
          {% if is_state('binary_sensor.alarm_sensors_ok', 'on') %}
            mdi:shield-check
          {% else %}
            mdi:shield-alert
          {% endif %}
  # `alarm_sensors_missing` — human-readable list of which sensors
  # are unavailable, used by the dashboard banner. Empty when all
  # are healthy. A regular `sensor:` because the state is a free-form
  # string (Polish label list joined with commas).
  - sensor:
      - name: Alarm sensors missing
        unique_id: alarm_sensors_missing
        state: >-
          {% set missing = namespace(s=[]) %}
          {% set pairs = [
            ('binary_sensor.battery_room_door_contact', 'czujnik drzwi'),
            ('binary_sensor.battery_room_motion_main_occupancy', 'czujnik ruchu (główny)'),
            ('binary_sensor.battery_room_motion_aux_occupancy', 'czujnik ruchu (pomocniczy)')
          ] %}
          {% for eid, label in pairs %}
            {% if states(eid) in ['unavailable', 'unknown'] %}
              {% set missing.s = missing.s + [label] %}
            {% endif %}
          {% endfor %}
          {{ missing.s | join(', ') }}

# ---- Notification group ----
# Single point of edit when adding / removing a family member's phone.
notify:
  - platform: group
    name: alarm_recipients
    services:
      - service: mobile_app_wojciechs_iphone
      - service: mobile_app_iphone_grzegorz

# ---- Automations ----
automation:
  # ---- Trigger bridge: a sensor opening while the panel is `armed_away`
  #      calls the panel's `alarm_trigger` service, which transitions
  #      it through `pending` (entry-delay countdown) and into
  #      `triggered`. The `manual.alarm_control_panel` platform has no
  #      built-in sensor-triggers field — automations wire the world. ----
  - alias: "jk_alarm: trigger panel on sensor open"
    id: jk_alarm_trigger_panel_on_sensor_open
    mode: single
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.battery_room_door_contact
          - binary_sensor.battery_room_motion_main_occupancy
          - binary_sensor.battery_room_motion_aux_occupancy
        to: "on"
    condition:
      - condition: state
        entity_id: alarm_control_panel.battery_room
        state: armed_away
    action:
      - service: alarm_control_panel.alarm_trigger
        target:
          entity_id: alarm_control_panel.battery_room

  # ---- Auto-arm: call arm_away once the room has been quiet for the
  #      configured duration (or the test-mode override). The template
  #      trigger's `for:` enforces continuous quiet — any sensor going
  #      `on` breaks the expression and the timer restarts. ----
  - alias: "jk_alarm: auto-arm"
    id: jk_alarm_auto_arm
    mode: single
    trigger:
      - platform: template
        value_template: >-
          {{ is_state('alarm_control_panel.battery_room', 'disarmed')
             and is_state('input_boolean.alarm_auto_arm_enabled', 'on')
             and is_state('binary_sensor.alarm_sensors_ok', 'on')
             and is_state('binary_sensor.battery_room_door_contact', 'off')
             and is_state('binary_sensor.battery_room_motion_main_occupancy', 'off')
             and is_state('binary_sensor.battery_room_motion_aux_occupancy', 'off') }}
        for:
          seconds: >-
            {% if is_state('input_boolean.alarm_test_mode', 'on') %}
              {{ states('input_number.alarm_test_quiet_seconds') | int(3) }}
            {% else %}
              {{ (states('input_number.alarm_arming_quiet_minutes') | int(5)) * 60 }}
            {% endif %}
    action:
      - service: alarm_control_panel.alarm_arm_away
        target:
          entity_id: alarm_control_panel.battery_room

  # ---- Capture which sensors are open at the moment the panel enters
  #      `pending` (the 10 s entry-delay before triggered). Lets the
  #      push notification spell out exactly what tripped. ----
  - alias: "jk_alarm: capture trigger reason"
    id: jk_alarm_capture_trigger_reason
    mode: single
    trigger:
      - platform: state
        entity_id: alarm_control_panel.battery_room
        to: pending
    action:
      - service: input_text.set_value
        target:
          entity_id: input_text.alarm_trigger_reason
        data:
          value: >-
            {% set reasons = [] %}
            {% if is_state('binary_sensor.battery_room_door_contact', 'on') %}
              {% set reasons = reasons + ['door'] %}
            {% endif %}
            {% if is_state('binary_sensor.battery_room_motion_main_occupancy', 'on') %}
              {% set reasons = reasons + ['motion_main'] %}
            {% endif %}
            {% if is_state('binary_sensor.battery_room_motion_aux_occupancy', 'on') %}
              {% set reasons = reasons + ['motion_aux'] %}
            {% endif %}
            {{ reasons | join(' · ') }}

  # ---- Side-effect: push notification on triggered (with actionable
  #      lock-screen buttons). Test mode logs instead. ----
  - alias: "jk_alarm: notify on triggered"
    id: jk_alarm_notify_on_triggered
    mode: single
    trigger:
      - platform: state
        entity_id: alarm_control_panel.battery_room
        to: triggered
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.alarm_test_mode
                state: "on"
            sequence:
              - service: input_text.set_value
                target:
                  entity_id: input_text.alarm_test_log
                data:
                  value: "push:{{ states('input_text.alarm_trigger_reason') }}"
        default:
          - service: notify.alarm_recipients
            data:
              title: "🚨 Alarm pomieszczenia akumulatorów"
              message: >-
                {% set ns = namespace(s=states('input_text.alarm_trigger_reason')) %}
                {% set tr = {
                  'door': 'otwarcie drzwi',
                  'motion_main': 'ruch (główny)',
                  'motion_aux': 'ruch (pomocniczy)'
                } %}
                {% for k, v in tr.items() %}
                  {% set ns.s = ns.s.replace(k, v) %}
                {% endfor %}
                Wyzwolony przez: {{ ns.s }}
              data:
                # iOS-specific critical-alert payload — bypasses Do Not
                # Disturb and the silent switch. Android equivalents
                # via channel + importance below.
                push:
                  sound:
                    critical: 1
                    name: default
                    volume: 1.0
                  interruption-level: critical
                channel: alarm
                importance: high
                ttl: 0
                priority: high
                # Lock-screen action buttons. `authentication_required`
                # forces a Face ID / passcode unlock before the action
                # fires, which is essential for a destructive disarm.
                actions:
                  - action: "DISARM_BATTERY_ROOM"
                    title: "Rozbroj"
                    destructive: true
                    authentication_required: true
                  - action: "SILENCE_BATTERY_ROOM"
                    title: "Wycisz syrenę"
                    authentication_required: true
                  - action: "URI"
                    title: "Otwórz panel"
                    uri: "/local/alarm.html"

  # ---- Side-effect: siren on triggered. The siren auto-quiets after
  #      its `duration` parameter; the panel state stays `triggered`
  #      (since trigger_time: 0). ----
  - alias: "jk_alarm: siren on triggered"
    id: jk_alarm_siren_on_triggered
    mode: single
    trigger:
      - platform: state
        entity_id: alarm_control_panel.battery_room
        to: triggered
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.alarm_test_mode
                state: "on"
            sequence:
              - service: input_text.set_value
                target:
                  entity_id: input_text.alarm_test_log
                data:
                  value: "siren_on:{{ states('input_number.alarm_siren_duration_s') | int(60) }}"
        default:
          - service: siren.turn_on
            target:
              entity_id: siren.battery_room_siren
            data:
              duration: "{{ states('input_number.alarm_siren_duration_s') | int(60) }}"

  # ---- Side-effect: siren off + reason clear on disarm. ----
  - alias: "jk_alarm: cleanup on disarm"
    id: jk_alarm_cleanup_on_disarm
    mode: single
    trigger:
      - platform: state
        entity_id: alarm_control_panel.battery_room
        to: disarmed
    action:
      - service: input_text.set_value
        target:
          entity_id: input_text.alarm_trigger_reason
        data:
          value: ""
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.alarm_test_mode
                state: "on"
            sequence:
              - service: input_text.set_value
                target:
                  entity_id: input_text.alarm_test_log
                data:
                  value: "siren_off"
        default:
          - service: siren.turn_off
            target:
              entity_id: siren.battery_room_siren

  # ---- Mobile-app notification action callbacks. Both actions arrive
  #      via the `mobile_app_notification_action` event; the choose:
  #      block dispatches by the `action` key. ----
  - alias: "jk_alarm: handle notification action"
    id: jk_alarm_handle_notification_action
    mode: parallel
    max: 5
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: DISARM_BATTERY_ROOM
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: SILENCE_BATTERY_ROOM
    action:
      - choose:
          - conditions:
              - "{{ trigger.event.data.action == 'DISARM_BATTERY_ROOM' }}"
            sequence:
              - service: alarm_control_panel.alarm_disarm
                target:
                  entity_id: alarm_control_panel.battery_room
          - conditions:
              - "{{ trigger.event.data.action == 'SILENCE_BATTERY_ROOM' }}"
            sequence:
              - service: siren.turn_off
                target:
                  entity_id: siren.battery_room_siren

  # ---- Low-battery alert — unchanged, still fires off the per-device
  #      `*_battery_low` binary sensors Z2M exposes. ----
  - alias: alarm_sensor_battery_low
    description: Notify family when an alarm sensor's battery is low.
    mode: single
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.battery_room_door_battery_low
          - binary_sensor.battery_room_motion_aux_battery_low
        to: "on"
        for: "00:05:00"
    action:
      - service: notify.alarm_recipients
        data:
          title: "🔋 Czujnik alarmu — niski poziom baterii"
          message: >-
            {{ trigger.to_state.attributes.friendly_name or trigger.entity_id }}
            zgłasza niski poziom baterii. Wymień ogniwo, zanim alarm zostanie
            zdegradowany.
          data:
            channel: alarm
            importance: high
            push:
              interruption-level: time-sensitive
