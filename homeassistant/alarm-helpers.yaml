# Helpers for the battery-room alarm. Driven by homeassistant/node-red/flows.json
# and rendered by dashboard/alarm/index.html.
#
# Deployed by `scripts/deploy-ha.sh` as `/config/packages/jk_alarm.yaml`.
# HA merges each file in `/config/packages/` per-domain via the
# `homeassistant.packages: !include_dir_named packages` directive (added
# idempotently by the deploy script). Re-running the deploy is safe — it
# overwrites the whole file.
#
# Model: `input_select.alarm_state` is the single source of truth for the
# alarm's state machine. The dashboard's ARM / DISARM buttons just write
# to this select. The Node-RED FSM also reads & writes it. The
# `input_boolean.alarm_auto_arm_enabled` is the master toggle for the
# auto-arming logic (turn off when working in the room).

input_boolean:
  alarm_auto_arm_enabled:
    name: Alarm auto-arm enabled
    icon: mdi:shield-sync
    initial: true

input_number:
  alarm_arming_quiet_minutes:
    name: Alarm arming quiet minutes
    min: 1
    max: 30
    step: 1
    unit_of_measurement: "min"
    icon: mdi:timer-sand
    initial: 5
  alarm_siren_duration_s:
    name: Alarm siren duration
    min: 10
    max: 600
    step: 5
    unit_of_measurement: "s"
    icon: mdi:bullhorn
    initial: 60
  alarm_arming_grace_seconds:
    name: Alarm arming grace seconds
    min: 0
    max: 60
    step: 1
    unit_of_measurement: "s"
    icon: mdi:run-fast
    initial: 10

input_select:
  alarm_state:
    name: Alarm state
    icon: mdi:state-machine
    options:
      - disarmed
      - arming
      - armed
      - triggered
    initial: disarmed

input_text:
  alarm_trigger_reason:
    name: Alarm trigger reason
    icon: mdi:information
    initial: ""
    max: 64
  # Set by the Node-RED FSM wrapper when any required sensor reads
  # `unavailable` / `unknown`. Dashboard reads this to surface a
  # warning ("uwaga: czujnik X niedostępny") so the user knows the
  # system is degraded.
  alarm_sensor_status:
    name: Alarm sensor status
    icon: mdi:alert
    initial: ""
    max: 128

# Notification group — single point of edit when adding / removing a
# family member's phone. Both the alarm trigger (Node-RED) and the
# low-battery automation below call `notify.alarm_recipients`.
notify:
  - platform: group
    name: alarm_recipients
    services:
      - service: mobile_app_wojciechs_iphone
      - service: mobile_app_iphone_grzegorz

# Low-battery alert — push to the group when any door / motion sensor
# reports `battery_low: on` (Zigbee2MQTT exposes a binary_sensor per
# device). The `for: "5m"` debounces brief radio glitches that flip
# the attribute momentarily.
automation:
  - alias: alarm_sensor_battery_low
    description: Notify family when an alarm sensor's battery is low.
    mode: single
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.battery_room_door_battery_low
          - binary_sensor.battery_room_motion_aux_battery_low
        to: "on"
        for: "00:05:00"
    action:
      - service: notify.alarm_recipients
        data:
          title: "🔋 Czujnik alarmu — niski poziom baterii"
          message: >-
            {{ trigger.to_state.attributes.friendly_name or trigger.entity_id }}
            zgłasza niski poziom baterii. Wymień ogniwo, zanim alarm zostanie
            zdegradowany.
          data:
            channel: alarm
            importance: high
            push:
              interruption-level: time-sensitive
