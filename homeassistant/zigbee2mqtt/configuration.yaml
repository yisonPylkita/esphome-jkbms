    friendly_name: battery_room_motion_main
    description: ""
  "0xa4c1388fb2a89f51":
    friendly_name: battery_room_siren
  "0xa4c1389267954032":
    friendly_name: battery_room_motion_aux
  "0xa4c13889af0fd9e7":
