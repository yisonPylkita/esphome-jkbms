# Helpers driving the Node-RED heater FSM (node-red/heater-control.flow.json).
# Append the contents of this file to /config/configuration.yaml on the HA box.
#
# Tunables surface in HA UI under Settings → Devices & Services → Helpers, so
# you can change thresholds without touching Node-RED.

input_boolean:
  heater_request:
    name: Heater request
    icon: mdi:radiator

input_number:
  heater_soc_floor:
    name: Heater SOC floor
    min: 50
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-50
    initial: 85
  heater_sun_elevation_min:
    name: Heater sun elevation min
    min: 0
    max: 60
    step: 1
    unit_of_measurement: "°"
    icon: mdi:weather-sunny
    initial: 15
  heater_probe_seconds:
    name: Heater probe seconds
    min: 5
    max: 300
    step: 5
    unit_of_measurement: "s"
    icon: mdi:timer-outline
    initial: 30
  heater_backoff_minutes:
    name: Heater backoff minutes
    min: 1
    max: 60
    step: 1
    unit_of_measurement: "min"
    icon: mdi:timer-sand
    initial: 5
  heater_discharge_threshold_w:
    name: Heater discharge threshold
    min: 0
    max: 500
    step: 10
    unit_of_measurement: "W"
    icon: mdi:battery-arrow-down
    initial: 50

input_text:
  heater_state:
    name: Heater state
    icon: mdi:state-machine
    initial: idle
    max: 32
