      - lambda: return x + 100.0;
    unit_of_measurement: "%"
##------------------------------OLED1306--------------------------------------##
# Робота с шрифтами
font:
  - file: "fonts/Montserrat-Bold.ttf"
    id: font_small
    size: 15
  - file: "fonts/Montserrat-Bold.ttf"
    id: font_medium
    size: 18
  - file: "fonts/Montserrat-Bold.ttf"
    id: font_large
    size: 33

## робота с картинками (фон белий обизательно)
image:
  - file: "images/Wh.png"
    id: "Wh" 
    resize: 30x30
  - file: "images/compresor.png"
    id: "compresor" 
    resize: 25x25

## Окно-анимация-делаем три соя-добавляем три кадра-стоя на кадре-вибираем слой(контрол-альт-шифт-s)
animation:
  - file: "images/HAapi_ani.gif"
    id: HAapi_ani
    resize: 18x18

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    i2c_id: bus_a
    address: 0x3C
    id: oled_display
    pages:
      - id: page_1
        lambda: |-
          //основная постояная
          it.printf(20, 0, id(font_small), "SOC_116");
          it.printf(20, 10 , id(font_large), "%.0f°/.", id(SOCStateOfcharge).state);          
          it.printf(60, 40, id(font_medium), "%.0f W", id(BatCurrentt).state);
          it.printf(0, 40, id(font_medium), "%.1fV", id(total_voltage).state);



            //мигаємо по стану конекта з ХА
          if (id(conekt_API).state) {id(HAapi_ani).next_frame(); it.image(0,0, id(HAapi_ani));}
            // рисуем палочки..
            int width = it.get_width();
            int height = it.get_height();
            // уровень сигнала..
            int rssi = 100;
            if (id(wifi_sig).has_state()) {
            rssi = id(wifi_sig).state;
            }
            int bars = 5;
            int bar_size = 3;
            int margin = 1;
            int x = width - (bar_size + margin) * bars - margin;
            int y = 0;
            int fill = 0;
            if (rssi > 50) {
            fill = 5;
            } else if (rssi > 40) {
            fill = 4;
            } else if (rssi > 30) {
            fill = 3;
            } else if (rssi > 20) {
            fill = 2;
            } else if (rssi > 10) {
            fill = 1;
            }
            for (int i = 0; i < bars; i++) {
            int itx = x + i * (bar_size + margin);
            int ity = y + (bars - i - 1) * bar_size;
            if (i < fill) {
              it.filled_rectangle(itx, ity, bar_size, bar_size + bar_size * i);
            } else {
              // it.rectangle(itx, ity, bar_size, bar_size + bar_size * i);
              it.line(itx, y + (bars * bar_size) - 1, itx + bar_size, y + (bars * bar_size) - 1);
            }
            }