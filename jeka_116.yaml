#Сумуємо за добу
  - platform: total_daily_energy
    name: "BatCurrentt_day"
    id: BatCurrentt_day
    power_id: BatCurrentt
    unit_of_measurement: 'kWh'
    accuracy_decimals: 3
    filters:
