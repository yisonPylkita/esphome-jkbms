#geka116(1.0)
# RX на RO а TX на DI і flow на de-re (при позетивному кконекті ритмічно мигає диод конекта наморді)
substitutions:
  plug_name: (geka116)
  ip_name: (geka116)
  wifi_ip: '192.168.3.116'
  jeka_tx_pin: GPIO17
  jeka_rx_pin: GPIO16
  flow_control_pin: GPIO23
esphome:
  project:
    name: "geka116"
    version: "1.0.0"
  name: geka116       
  platform: ESP32       
  board: nodemcu-32s    
  on_boot:
    priority: 800
    then:
## 
wifi:
  output_power: 20dB
  ssid: "--сід вафлі--"
  password: "пароль"
  fast_connect: on
  manual_ip:
    static_ip: ${wifi_ip}
    gateway: 192.168.3.1
    subnet: 255.255.255.0
  ap:
    password: "пароль"
captive_portal:
##
logger:
  logs:
    climate: none
    sensor: none
    component: ERROR

##
api:
 reboot_timeout: 0s

##
ota:
  - platform: esphome
## 
web_server:
  port: 80
  local: true
# Иницыализацыя шины i2c без сканировки..
i2c:
  - id: bus_a
    sda: 21
    scl: 22
    scan: false
    frequency: 100kHz
##============================================================================##
uart:
  - id: uart_jeka
    baud_rate: 115200
    rx_buffer_size: 384
    tx_pin: ${jeka_tx_pin}
    rx_pin: ${jeka_rx_pin}
modbus:
  - id: modbus_jeka
    uart_id: uart_jeka
    flow_control_pin: ${flow_control_pin}
    send_wait_time: 200ms
modbus_controller:
  - id: bms0
    address: 0x01
    modbus_id: modbus_jeka
    setup_priority: -10
    update_interval: 5s
    command_throttle: 50ms
##============================================================================##
time:
  - platform: homeassistant
    id: esptime
    timezone: UTC-2
interval:
# Частота переключения екрана
  - interval: 10s
    then:
      - display.page.show_next: oled_display
      - component.update: oled_display
### - - - - - - - - - - - - -   текстовий  - - - - - - - - - -  - - - ###
text_sensor:
  - platform: template
    name: "${ip_name} esptime"
    entity_category: diagnostic
    id: timeee
    lambda:
          char str[17];
          time_t currTime = id(esptime).now().timestamp;
          strftime(str, sizeof(str), "%d-%m-%Y %H:%M", localtime(&currTime));
          return  { str };

# 
  - platform: wifi_info
    ip_address:
      id: IP_Address
### - - - - - - - - - - - - -  бинарные сенсор  - - - - - - - - - - -  - - - ###
binary_sensor:
## статус подключения к ховму
  - platform: status
    id: conekt_API


### - - - - - - - - - - - - - - - - сенсоры - - - - - - - - - - - -  - - - - ###
