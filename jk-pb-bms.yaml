#
# JK-PB2A16S20P over RS485 -> ESP32-C3 Super Mini -> Home Assistant.
#
# Single-file ESPHome config. Sections in order:
#   1. substitutions / esphome / esp32 / logger / api / ota / wifi / web
#   2. uart / modbus / modbus_controller
#   3. binary_sensor / sensor / text_sensor / button
#
# The Modbus register map (everything addressed in the 0x10xx..0x15xx range)
# is derived from syssi/esphome-jk-bms `esp32-jk-pb-modbus-example.yaml`
# (Apache-2.0). Local changes vs upstream:
#   - Stripped upstream device-level blocks (the parent owns those).
#   - Removed the `select:` charge/discharge/balance enable controls (read-only
#     v1 — re-add once polling is stable on real hardware).
#   - Cosmetic: `°C` instead of `℃`, "discharge" typo fix, condensed comments.
#
# Pin choices avoid ESP32-C3 strapping pins (GPIO 2/8/9) and reserved native
# USB-CDC pins (GPIO 18/19).
#
# See docs/superpowers/specs/2026-05-01-jk-pb-esphome-integration-design.md.

substitutions:
  name: jk-pb-bms
  device_friendly_name: "JK-PB BMS"
  device_addr: "1"
  modbus_controller_update_interval: "30s"
  bms_control_params_skip_updates: "20"
  uart_tx_pin: GPIO21
  uart_rx_pin: GPIO20
  flow_control_pin: GPIO10

esphome:
  name: ${name}
  friendly_name: ${device_friendly_name}
  min_version: 2025.11.0

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: esp-idf

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80
  version: 3

uart:
  - id: uart_0
    baud_rate: 115200
    tx_pin: ${uart_tx_pin}
    rx_pin: ${uart_rx_pin}
    rx_buffer_size: 384

modbus:
  - id: modbus0
    uart_id: uart_0
    flow_control_pin: ${flow_control_pin}

modbus_controller:
  - id: bms0
    address: ${device_addr}
    modbus_id: modbus0
    setup_priority: -10
    update_interval: ${modbus_controller_update_interval}
    command_throttle: 50ms

# charging, discharging, and balancing binary_sensors made as the template sensors
# to optimize number of modbus requests
binary_sensor:
  - platform: template
    id: charging
    name: "charging"
    lambda: |-
      return id(charging_raw).state == 1;

  - platform: template
    id: discharging
    name: "discharging"
    lambda: |-
      return id(discharging_raw).state == 1;

  - platform: template
    id: balancing
    name: "balancing"
    lambda: |-
      return id(balancing_raw).state == 1;

  - platform: modbus_controller
    modbus_controller_id: bms0
    name: "charging float mode"
    address: 0x1114
    register_type: holding
    bitmask: 0x0200

sensor:
  # ---- diagnostics (own this device) ----
  - platform: wifi_signal
    name: "${device_friendly_name} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${device_friendly_name} Uptime"

  - platform: internal_temperature
    name: "${device_friendly_name} Internal Temperature"

  # ---- BMS register map (Apache-2.0, syssi/esphome-jk-bms) ----

  # 0x1000 0 UINT32 4 RW    VolSmartSleep    mV
  - platform: modbus_controller
    modbus_controller_id: bms0
    name: "smart sleep"
    address: 0x1000
    register_type: holding
    value_type: U_DWORD
    register_count: 4
    response_size: 4
    skip_updates: ${bms_control_params_skip_updates}
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  # 0x1004 4 UINT32 4 RW    VolCellUV       mV
  - platform: modbus_controller
    modbus_controller_id: bms0
    name: "cell UVP"
    address: 0x1004
