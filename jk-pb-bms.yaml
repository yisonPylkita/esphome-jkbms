#
# ESPHome firmware for an ESP32-C3 that bridges a JK BMS to Home Assistant
# over Bluetooth Low Energy. Read-only — exposes everything the JK02_32S
# BLE protocol decodes (SOC, voltage, current, power, cell voltages,
# resistances, temperatures, balancing, errors).
#
# The BLE protocol implementation comes from syssi/esphome-jk-bms (Apache
# 2.0), pulled in as a build-time external component (see `external_
# components:` below) — ESPHome fetches and compiles it. No source from
# that project is redistributed in this repo, so this YAML stays plain
# MIT; the Apache-2.0 license applies to the compiled binary's embedded
# upstream code, not to anything in this file.

substitutions:
  name: jk-pb-bms
  device_friendly_name: "JK-PB BMS"
  protocol_version: JK02_32S

esphome:
  name: ${name}
  friendly_name: ${device_friendly_name}
  min_version: 2025.11.0
  on_boot:
    - priority: 800.0
      then:
        - logger.log:
            format: "[JKBMS] === Boot start === BLE full build, protocol=${protocol_version}"
            level: INFO

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: esp-idf

external_components:
  # Pinned to a specific commit for reproducible builds. Bump when you
  # actually want a newer revision of jk_bms_ble; don't track @main blindly.
  - source: github://syssi/esphome-jk-bms@24e9187ddc55eafc29fcc00b9172bb9ea1b1ad72

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG
  logs:
    esp32_ble_tracker: INFO
    esp32_ble_client: INFO
    component: WARN
    scheduler: WARN
    sensor: INFO
    wifi: WARN
    api: WARN

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password
    on_begin:
      then:
        - switch.turn_off: ble_client_switch0
        - logger.log: "[JKBMS] BLE suspended for OTA"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  power_save_mode: NONE
  fast_connect: false
  # 8.5 dBm worked stably on home USB power earlier;
  # 17.0 caused brown-outs on laptop USB-C in testing.
  output_power: 8.5
  ap:
    ssid: "${device_friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80
  version: 3

time:
  - platform: homeassistant
    id: ha_time

# ---- BLE stack ----
esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: "C8:47:80:2B:46:E3"
    id: client0

# ---- JK BMS BLE component ----
jk_bms_ble:
  - ble_client_id: client0
    protocol_version: ${protocol_version}
    throttle: 1s
    id: bms0

# ---- entities ----
binary_sensor:
  - platform: jk_bms_ble
    balancing:
      name: "balancing"
    charging:
      name: "charging"
    discharging:
      name: "discharging"
    heating:
      name: "heating"
    online_status:
      name: "online status"

switch:
  - platform: ble_client
    ble_client_id: client0
    id: ble_client_switch0
    name: "${device_friendly_name} BLE enable"

sensor:
  # ---- ESP diagnostics ----
  - platform: wifi_signal
    name: "${device_friendly_name} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${device_friendly_name} Uptime"

  - platform: internal_temperature
    name: "${device_friendly_name} Internal Temperature"

  # ---- pack-level ----
  - platform: jk_bms_ble
    jk_bms_ble_id: bms0
    total_voltage:
      name: "total voltage"
      filters:
        - throttle: 1s
        - delta: 0.01
    current:
      name: "current"
      filters:
        - throttle: 1s
        - delta: 0.05
    power:
      name: "power"
      filters:
        - throttle: 1s
        - delta: 1.0
    charging_power:
      name: "charging power"
      filters:
        - throttle: 1s
        - delta: 1.0
    discharging_power:
      name: "discharging power"
      filters:
        - throttle: 1s
        - delta: 1.0
    state_of_charge:
      name: "state of charge"
      filters:
        - throttle: 10s
        - delta: 0.1
    state_of_health:
      name: "state of health"
    capacity_remaining:
      name: "capacity remaining"
      filters:
        - throttle: 30s
        - delta: 0.01
    total_battery_capacity_setting:
      name: "total battery capacity"
    charging_cycles:
      name: "charging cycles"
    total_charging_cycle_capacity:
      name: "total charging cycle capacity"
      filters:
        - throttle: 60s
        - delta: 0.1
    delta_cell_voltage:
      name: "delta cell voltage"
      filters:
        - throttle: 1s
        - delta: 0.001
    average_cell_voltage:
      name: "average cell voltage"
      filters:
        - throttle: 1s
        - delta: 0.001
    min_cell_voltage:
      name: "min cell voltage"
      filters:
        - throttle: 1s
        - delta: 0.001
    max_cell_voltage:
      name: "max cell voltage"
      filters:
        - throttle: 1s
        - delta: 0.001
    min_voltage_cell:
      name: "min voltage cell"
    max_voltage_cell:
      name: "max voltage cell"
    temperature_sensor_1:
      name: "temperature sensor 1"
      filters:
        - throttle: 10s
        - delta: 0.1
    temperature_sensor_2:
      name: "temperature sensor 2"
      filters:
        - throttle: 10s
        - delta: 0.1
    temperature_sensor_3:
      name: "temperature sensor 3"
      filters:
        - throttle: 10s
        - delta: 0.1
    temperature_sensor_4:
      name: "temperature sensor 4"
      filters:
        - throttle: 10s
        - delta: 0.1
    temperature_sensor_5:
      name: "temperature sensor 5"
      filters:
        - throttle: 10s
        - delta: 0.1
    power_tube_temperature:
      name: "power tube temperature"
    balancing_current:
      name: "balancing current"
    errors_bitmask:
      name: "errors bitmask"
    charge_status_id:
      name: "charge status id"

  # ---- per-cell voltages (16S) ----
  - platform: jk_bms_ble
    jk_bms_ble_id: bms0
    cell_voltage_1:
      name: "cell voltage 1"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_2:
      name: "cell voltage 2"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_3:
      name: "cell voltage 3"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_4:
      name: "cell voltage 4"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_5:
      name: "cell voltage 5"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_6:
      name: "cell voltage 6"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_7:
      name: "cell voltage 7"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_8:
      name: "cell voltage 8"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_9:
      name: "cell voltage 9"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_10:
      name: "cell voltage 10"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_11:
      name: "cell voltage 11"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_12:
      name: "cell voltage 12"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_13:
      name: "cell voltage 13"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_14:
      name: "cell voltage 14"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_15:
      name: "cell voltage 15"
      filters:
        - throttle: 1s
        - delta: 0.001
    cell_voltage_16:
      name: "cell voltage 16"
      filters:
        - throttle: 1s
        - delta: 0.001

  # ---- per-cell wire resistance (16S) ----
  - platform: jk_bms_ble
    jk_bms_ble_id: bms0
    cell_resistance_1:
      name: "cell resistance 1"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_2:
      name: "cell resistance 2"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_3:
      name: "cell resistance 3"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_4:
      name: "cell resistance 4"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_5:
      name: "cell resistance 5"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_6:
      name: "cell resistance 6"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_7:
      name: "cell resistance 7"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_8:
      name: "cell resistance 8"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_9:
      name: "cell resistance 9"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_10:
      name: "cell resistance 10"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_11:
      name: "cell resistance 11"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_12:
      name: "cell resistance 12"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_13:
      name: "cell resistance 13"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_14:
      name: "cell resistance 14"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_15:
      name: "cell resistance 15"
      filters:
        - throttle: 10s
        - delta: 0.001
    cell_resistance_16:
      name: "cell resistance 16"
      filters:
        - throttle: 10s
        - delta: 0.001

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${device_friendly_name} IP Address"
    ssid:
      name: "${device_friendly_name} SSID"

  - platform: jk_bms_ble
    jk_bms_ble_id: bms0
    errors:
      name: "errors"
    operation_status:
      name: "operation status"
    charge_status:
      name: "charge status"
    total_runtime_formatted:
      name: "total runtime formatted"
    software_version:
      name: "software version"
    hardware_version:
      name: "hardware version"

button:
  - platform: restart
    name: "${device_friendly_name} Restart"

  - platform: factory_reset
    name: "${device_friendly_name} Factory Reset"
    entity_category: diagnostic
