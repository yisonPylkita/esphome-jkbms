# JK-PB2A16S20P over RS485 -> ESP32-C3 Super Mini -> Home Assistant.
# See docs/superpowers/specs/2026-05-01-jk-pb-esphome-integration-design.md
#
# The BMS-side Modbus register map lives in packages/jk-pb-modbus.yaml.
# This top-level file owns the device profile, network stack, and pin map.
#
# Pin choices avoid ESP32-C3 strapping pins (GPIO 2/8/9) and reserved native
# USB-CDC pins (GPIO 18/19).

substitutions:
  name: jk-pb-bms
  device_friendly_name: "JK-PB BMS"
  device_addr: "1"
  modbus_controller_update_interval: "30s"
  bms_control_params_skip_updates: "20"
  uart_tx_pin: GPIO21
  uart_rx_pin: GPIO20
  flow_control_pin: GPIO10

esphome:
  name: ${name}
  friendly_name: ${device_friendly_name}
  min_version: 2025.11.0

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: esp-idf

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80
  version: 3

uart:
  - id: uart_0
    baud_rate: 115200
    tx_pin: ${uart_tx_pin}
    rx_pin: ${uart_rx_pin}
    rx_buffer_size: 384

packages:
  bms: !include packages/jk-pb-modbus.yaml

# Diagnostic entities (own this device — kept out of the BMS package so the
# package stays a pure register map).
sensor:
  - platform: wifi_signal
    name: "${device_friendly_name} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${device_friendly_name} Uptime"

  - platform: internal_temperature
    name: "${device_friendly_name} Internal Temperature"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${device_friendly_name} IP Address"
    ssid:
      name: "${device_friendly_name} SSID"

button:
  - platform: restart
    name: "${device_friendly_name} Restart"

  - platform: factory_reset
    name: "${device_friendly_name} Factory Reset"
    entity_category: diagnostic
