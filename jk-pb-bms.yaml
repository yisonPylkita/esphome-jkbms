text_sensor:
  # ---- diagnostics ----
  - platform: wifi_info
    ip_address:
      name: "${device_friendly_name} IP Address"
    ssid:
      name: "${device_friendly_name} SSID"

  # ---- BMS register map ----
  - platform: modbus_controller
    modbus_controller_id: bms0
    name: "setup passcode"
    register_type: holding
    address: 0x1470
    register_count: 8
    response_size: 16
    raw_encode: ANSI

  - platform: template
    name: "total runtime formatted"
    update_interval: 60s
    lambda: |-
      std::string value = "Unknown";
      if (id(total_runtime) && !isnan(id(total_runtime).state)) {
        uint32_t seconds = (uint32_t) id(total_runtime).state;
        uint32_t years = seconds / (24 * 3600 * 365);
        seconds = seconds % (24 * 3600 * 365);
        uint32_t days = seconds / (24 * 3600);
        seconds = seconds % (24 * 3600);
        uint32_t hours = seconds / 3600;
        value = (years ? to_string(years) + "y " : "") + (days ? to_string(days) + "d " : "") +
                (hours ? to_string(hours) + "h" : "");
      }
      return value;

  - platform: template
    id: alarms
    name: "alarms"
    update_interval: never
    lambda: |-
      static const uint8_t alarms_size = 22;
      static const char *const alarms[alarms_size] = {
        "Wire resistance",
        "MOS OTP",
        "Cell quantity",
        "Current sensor error",
        "Cell OVP",
        "Battery OVP",
        "Charge OCP",
        "Charge SCP",
        "Charge OTP",
        "Charge UTP",
        "CPU Aux comm error",
        "Cell UVP",
        "Batt UVP",
        "Discharge OCP",
        "Discharge SCP",
        "Discharge OTP",
        "Charge MOS",
        "Discharge MOS",
        "GPS Disconnected",
        "Modify PWD. in time",
        "Discharge On Failed",
        "Battery Over Temp Alarm"
      };
      std::string values = "";
      uint32_t mask = id(alarms_bitmask)->state;
      if (mask) {
        for (int i = 0; i < alarms_size; i++) {
          if (mask & (1 << i)) {
            values.append(alarms[i]);
            values.append("; ");
          }
        }
        if (!values.empty()) {
          values.pop_back();
        }
      }
      return values;

button:
  - platform: restart
    name: "${device_friendly_name} Restart"

  - platform: factory_reset
    name: "${device_friendly_name} Factory Reset"
    entity_category: diagnostic
