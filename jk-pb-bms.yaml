    register_count: 4
    response_size: 4
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - lambda: |-
          return id(current).state < 0
            ? x * -1
            : x;
      - multiply: 0.001

  - platform: modbus_controller
    modbus_controller_id: bms0
    name: "charging power"
    address: 0x1298
    register_type: holding
    value_type: S_DWORD
    register_count: 4
    response_size: 4
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.001
      - lambda: |-
          if (x > 0.0f && !isnan(id(total_voltage).state)) {
            return x * id(total_voltage).state;
          }
          return 0.0f;

  - platform: modbus_controller
